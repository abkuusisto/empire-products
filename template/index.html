<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
  :root { --blue: #3b82f6; --blue-dark: #2563eb; --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; --gray: #6b7280; --gray-light: #f3f4f6; --gray-border: #e5e7eb; --text: #111827; --text-muted: #6b7280; --bg: #ffffff; --radius: 12px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); background: var(--bg); line-height: 1.6; }
  .nav { position: sticky; top: 0; z-index: 100; background: white; border-bottom: 1px solid var(--gray-border); }
  .nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; }

  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab { padding: 6px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text-muted); transition: all .15s; }
  .nav-tab:hover { background: var(--gray-light); color: var(--text); }
  .nav-tab.active { background: var(--blue); color: white; }
  .nav-cta { background: var(--blue); color: white; padding: 8px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; text-decoration: none; border: none; cursor: pointer; }
  .page { display: none; }
  .page.active { display: block; }
  .hero { background: linear-gradient(135deg, #eff6ff 0%, #f8faff 100%); padding: 80px 24px 64px; text-align: center; }
  .hero h1 { font-size: clamp(28px, 5vw, 52px); font-weight: 800; line-height: 1.15; letter-spacing: -1px; max-width: 800px; margin: 0 auto 16px; }
  .hero p { font-size: clamp(16px, 2vw, 20px); color: var(--text-muted); max-width: 620px; margin: 0 auto 32px; }
  .hero-cta { display: inline-block; background: var(--blue); color: white; padding: 16px 36px; border-radius: 12px; font-weight: 700; font-size: 18px; text-decoration: none; }
  .trust-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 24px; background: white; border-bottom: 1px solid var(--gray-border); }
  .trust-item { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .trust-item::before { content: '✓'; color: var(--green); font-weight: 700; }
  .section { max-width: 1100px; margin: 0 auto; padding: 64px 24px; }
  .section-title { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 40px; }
  .testimonials-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
  .testimonial { background: var(--gray-light); border-radius: var(--radius); padding: 24px; }
  .testimonial-text { font-style: italic; color: var(--text); margin-bottom: 16px; line-height: 1.7; }
  .testimonial-author { font-weight: 700; font-size: 14px; }
  .testimonial-role { font-size: 13px; color: var(--text-muted); }
  .problems-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .problem-card { border: 1px solid var(--gray-border); border-radius: var(--radius); padding: 20px; }
  .problem-icon { font-size: 28px; margin-bottom: 10px; }
  .problem-title { font-weight: 700; margin-bottom: 6px; }
  .problem-desc { font-size: 14px; color: var(--text-muted); }
  .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; }
  .step { text-align: center; }
  .step-num { width: 44px; height: 44px; background: var(--blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; margin: 0 auto 14px; }
  .step-title { font-weight: 700; font-size: 15px; }
  .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
  .feature-card { border: 1px solid var(--gray-border); border-radius: var(--radius); padding: 24px; }
  .feature-icon { font-size: 28px; margin-bottom: 12px; }
  .feature-title { font-weight: 700; margin-bottom: 6px; }
  .feature-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
  .plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto; }
  .plan-card { border: 2px solid var(--gray-border); border-radius: var(--radius); padding: 28px; position: relative; }
  .plan-card.popular { border-color: var(--blue); }
  .popular-badge { position: absolute; top: -13px; left: 50%; transform: translateX(-50%); background: var(--blue); color: white; font-size: 12px; font-weight: 700; padding: 3px 14px; border-radius: 20px; white-space: nowrap; }
  .plan-name { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .plan-price { font-size: 32px; font-weight: 800; color: var(--blue); margin: 12px 0 6px; }
  .plan-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
  .plan-features { list-style: none; margin-bottom: 24px; }
  .plan-features li { font-size: 14px; padding: 5px 0; display: flex; align-items: flex-start; gap: 8px; }
  .plan-features li::before { content: '✓'; color: var(--green); font-weight: 700; flex-shrink: 0; margin-top: 1px; }
  .plan-cta { display: block; text-align: center; background: var(--blue); color: white; padding: 12px; border-radius: 8px; font-weight: 700; text-decoration: none; }
  .faq-list { max-width: 720px; margin: 0 auto; }
  .faq-item { border-bottom: 1px solid var(--gray-border); padding: 20px 0; }
  .faq-q { font-weight: 700; margin-bottom: 8px; font-size: 16px; }
  .faq-a { font-size: 15px; color: var(--text-muted); line-height: 1.7; }
  .cta-section { background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%); color: white; text-align: center; padding: 64px 24px; }
  .cta-section h2 { font-size: 32px; font-weight: 800; margin-bottom: 12px; }
  .cta-section p { font-size: 18px; opacity: 0.85; margin-bottom: 32px; }
  .cta-section a { background: white; color: var(--blue); padding: 16px 36px; border-radius: 12px; font-weight: 700; font-size: 18px; text-decoration: none; display: inline-block; }
  .cta-trust { margin-top: 20px; font-size: 14px; opacity: 0.7; display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; }
  .demo-page { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
  .demo-form-card { background: var(--gray-light); border-radius: var(--radius); padding: 32px; margin-bottom: 32px; }
  .demo-form-card h2 { font-size: 22px; font-weight: 800; margin-bottom: 20px; }
  .demo-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .demo-input-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .demo-input-group input { width: 100%; padding: 10px 14px; border: 1px solid var(--gray-border); border-radius: 8px; font-size: 15px; }
  .demo-btn { background: var(--blue); color: white; padding: 12px 28px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; font-size: 16px; }
  .demo-results { display: none; }
  .demo-results.visible { display: block; }
  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .metric-card { background: white; border-radius: 10px; padding: 20px; text-align: center; border: 1px solid var(--gray-border); }
  .metric-value { font-size: 28px; font-weight: 800; color: var(--blue); }
  .metric-label { font-size: 13px; font-weight: 600; margin: 4px 0 2px; }
  .metric-trend { font-size: 12px; color: var(--text-muted); }
  .result-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; margin-bottom: 24px; border: 1px solid var(--gray-border); }
  .result-table th { background: var(--gray-light); padding: 12px 16px; font-size: 13px; font-weight: 700; text-align: left; }
  .result-table td { padding: 12px 16px; border-top: 1px solid var(--gray-border); font-size: 14px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .badge.green { background: #dcfce7; color: #15803d; }
  .badge.red { background: #fee2e2; color: #b91c1c; }
  .findings { background: white; border-radius: 10px; border: 1px solid var(--gray-border); overflow: hidden; }
  .findings-header { padding: 16px 20px; background: var(--gray-light); font-weight: 700; font-size: 15px; }
  .finding-item { padding: 16px 20px; border-top: 1px solid var(--gray-border); display: flex; gap: 14px; align-items: flex-start; }
  .finding-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .finding-dot.critical { background: var(--red); }
  .finding-dot.good { background: var(--green); }
  .finding-title { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
  .finding-detail { font-size: 13px; color: var(--text-muted); }
  .finding-action { font-size: 13px; color: var(--blue); margin-top: 4px; font-weight: 500; }
  .sales-page { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
  .sales-page h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .sales-page .page-sub { color: var(--text-muted); margin-bottom: 32px; font-size: 15px; }
  .email-card { border: 1px solid var(--gray-border); border-radius: var(--radius); margin-bottom: 20px; overflow: hidden; }
  .email-card-header { background: var(--gray-light); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .email-card-label { font-weight: 700; font-size: 14px; }
  .email-badge { background: var(--blue); color: white; font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 20px; }
  .email-body { padding: 20px; white-space: pre-wrap; font-size: 14px; line-height: 1.8; color: var(--text); font-family: inherit; }
  .copy-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--gray-light); border: 1px solid var(--gray-border); border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; margin: 0 20px 16px; }
  .objections-section { margin-top: 40px; }
  .objections-section h2 { font-size: 22px; font-weight: 800; margin-bottom: 20px; }
  .objection-card { border: 1px solid var(--gray-border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
  .objection-q { padding: 16px 20px; background: #fef3c7; font-weight: 700; font-size: 14px; border-bottom: 1px solid var(--gray-border); }
  .objection-q::before { content: '❓ '; }
  .objection-a { padding: 16px 20px; font-size: 14px; line-height: 1.7; color: var(--text); }
  .linkedin-card { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: var(--radius); padding: 20px; margin: 24px 0; }
  .linkedin-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .linkedin-body { font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
  .fulfillment-page { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
  .fulfillment-page h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .fulfillment-page .page-sub { color: var(--text-muted); margin-bottom: 32px; font-size: 15px; }
  .onboarding-steps { margin-bottom: 40px; }
  .onboarding-steps h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
  .onboard-step { display: flex; gap: 16px; margin-bottom: 16px; }
  .onboard-num { width: 32px; height: 32px; background: var(--blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; }
  .onboard-text { padding-top: 5px; font-size: 14px; line-height: 1.6; }
  .customer-gets-section { margin-bottom: 40px; }
  .customer-gets-section h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
  .gets-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
  .gets-item { background: var(--gray-light); border-radius: 10px; padding: 14px 18px; font-size: 14px; display: flex; align-items: center; gap: 10px; }
  .gets-item::before { content: '✅'; font-size: 16px; }
  .ai-role-section { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: var(--radius); padding: 24px; margin-bottom: 32px; }
  .ai-role-section h2 { font-size: 18px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .ai-role-body { font-size: 14px; line-height: 1.8; color: var(--text); }
  .first-value-box { background: #dcfce7; border: 1px solid #86efac; border-radius: var(--radius); padding: 20px; display: flex; align-items: flex-start; gap: 14px; }
  .first-value-icon { font-size: 28px; }
  .first-value-label { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .first-value-text { font-size: 14px; color: var(--text); }
  .readiness-page { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
  .readiness-page h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .readiness-page .page-sub { color: var(--text-muted); margin-bottom: 32px; font-size: 15px; }
  .score-hero { text-align: center; background: linear-gradient(135deg, #eff6ff 0%, #f8faff 100%); border-radius: 16px; padding: 40px 20px; margin-bottom: 32px; border: 1px solid #bfdbfe; }
  .score-number { font-size: 80px; font-weight: 900; color: var(--blue); line-height: 1; }
  .score-label { font-size: 18px; font-weight: 700; margin: 8px 0; }
  .score-badge { display: inline-block; padding: 6px 20px; border-radius: 24px; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
  .score-badge.approve { background: #dcfce7; color: #15803d; }
  .score-badge.human_review { background: #fef3c7; color: #92400e; }
  .score-badge.reject { background: #fee2e2; color: #b91c1c; }
  .score-summary { max-width: 600px; margin: 16px auto 0; font-size: 15px; color: var(--text-muted); line-height: 1.7; }
  .dims-grid { display: grid; gap: 12px; margin-bottom: 40px; }
  .dim-row { display: flex; align-items: center; gap: 12px; background: white; border: 1px solid var(--gray-border); border-radius: 10px; padding: 14px 18px; }
  .dim-name { min-width: 200px; font-size: 14px; font-weight: 600; color: var(--text); }
  .dim-bar-wrap { flex: 1; background: var(--gray-light); border-radius: 99px; height: 10px; overflow: hidden; }
  .dim-bar { height: 100%; border-radius: 99px; transition: width 1s ease; }
  .dim-bar.high { background: var(--green); }
  .dim-bar.mid { background: var(--yellow); }
  .dim-bar.low { background: var(--red); }
  .dim-score { min-width: 60px; text-align: right; font-size: 14px; font-weight: 700; }
  .empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); }
  footer { text-align: center; padding: 32px 24px; border-top: 1px solid var(--gray-border); font-size: 13px; color: var(--text-muted); }
  @media (max-width: 640px) { .demo-inputs { grid-template-columns: 1fr; } .metrics-grid { grid-template-columns: repeat(2, 1fr); } .nav-tabs { gap: 2px; } .nav-tab { padding: 5px 10px; font-size: 12px; } .dim-name { min-width: 130px; font-size: 12px; } }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo" id="navLogo">…</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('landing')">Landing</button>
      <button class="nav-tab" onclick="showPage('demo')">Demo</button>
      <button class="nav-tab" onclick="showPage('sales')">Sales Pack</button>

      <button class="nav-tab" onclick="showPage('readiness')">Readiness</button>

</nav>

<div id="page-demo" class="page"></div>
<div id="page-sales" class="page"></div>
<div id="page-fulfillment" class="page"></div>
<div id="page-readiness" class="page"></div>
<footer><p>A <strong>Qsisto</strong> product &middot; Operated by AB Empire Oy (Y-tunnus: 3499735-5) &middot; <a href="mailto:support@qsisto.com">support@qsisto.com</a></p></footer>
<script>
const P = PRODUCT_JSON_PLACEHOLDER;
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function copyText(t,b){navigator.clipboard.writeText(t).then(()=>{const o=b.innerHTML;b.innerHTML='✓ Copied!';setTimeout(()=>{b.innerHTML=o;},1500);});}
function showPage(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.getElementById('page-'+n).classList.add('active');document.querySelectorAll('.nav-tab').forEach(t=>{if(t.getAttribute('onclick')&&t.getAttribute('onclick').includes("'"+n+"'"))t.classList.add('active');});}
function renderLanding(){const L=P.landing||{};const name=esc(P.name||'Product');document.title=name;document.getElementById('navLogo').textContent=name;const nCta=document.getElementById('navCta');if(nCta)nCta.textContent=esc(L.cta_primary||'Get Early Access');const tH=(L.trust_items||[]).map(t=>`<span class="trust-item">${esc(t)}</span>`).join('');const spH=(L.social_proof||[]).map(t=>`<div class="testimonial"><div class="testimonial-text">"${esc(t.quote||t)}"</div><div class="testimonial-author">${esc(t.name||'Beta User')}</div><div class="testimonial-role">${esc(t.role||'Early Adopter')}</div></div>`).join('');const prH=(L.problems||[]).map(p=>`<div class="problem-card"><div class="problem-icon">${p.icon||'⚠️'}</div><div class="problem-title">${esc(p.title||'')}</div><div class="problem-desc">${esc(p.desc||'')}</div></div>`).join('');const hwH=(L.how_steps||[]).map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div class="step-title">${esc(s.title||s)}</div>${s.desc?`<div class="step-desc">${esc(s.desc)}</div>`:''}</div>`).join('');const ftH=(L.features||[]).map(f=>`<div class="feature-card"><div class="feature-icon">${f.icon||'✨'}</div><div class="feature-title">${esc(f.title||f.name||'')}</div><div class="feature-desc">${esc(f.desc||f.description||'')}</div></div>`).join('');const plH=(L.plans||[]).map(pl=>`<div class="plan-card${pl.popular?' popular':''}"> ${pl.popular?'<div class="popular-badge">Most Popular</div>':''}<div class="plan-name">${esc(pl.name)}</div><div class="plan-price">${esc(pl.price)}</div><div class="plan-desc">${esc(pl.desc||'')}</div><ul class="plan-features">${(pl.features||[]).map(f=>`<li>${esc(f)}</li>`).join('')}</ul><a href="${esc(P.stripe_starter_url||P.stripe_pro_url||'#')}" class="plan-cta">${esc(pl.cta||'Get Started')}</a></div>`).join('');const fqH=(L.faq||[]).map(f=>`<div class="faq-item"><div class="faq-q">${esc(f.q||'')}</div><div class="faq-a">${esc(f.a||'')}</div></div>`).join('');document.getElementById('page-landing').innerHTML=`<div class="hero"><h1>${esc(L.headline||name)}</h1><p>${esc(L.subheadline||'')}</p><a href="#" class="hero-cta" id="heroCTABtn">${esc(L.cta_primary||'Get Early Access')}</a></div>${tH?`<div class="trust-bar">${tH}</div>`:''}${spH?`<div class="section"><div class="testimonials-grid">${spH}</div></div>`:''}${prH?`<div style="background:var(--gray-light);padding:64px 0;"><div class="section" style="padding-top:0;padding-bottom:0;"><h2 class="section-title">${esc(L.problem_title||'Sound Familiar?')}</h2><div class="problems-grid">${prH}</div></div></div>`:''} ${hwH?`<div class="section"><h2 class="section-title">How It Works</h2><div class="steps">${hwH}</div></div>`:''}${ftH?`<div style="background:var(--gray-light);padding:64px 0;"><div class="section" style="padding-top:0;padding-bottom:0;"><h2 class="section-title">${esc(L.features_title||'Features')}</h2><div class="features-grid">${ftH}</div></div></div>`:''}${plH?`<div class="section"><h2 class="section-title">Simple, Transparent Pricing</h2><div class="plans-grid">${plH}</div></div>`:''}${fqH?`<div class="section"><h2 class="section-title">FAQ</h2><div class="faq-list">${fqH}</div></div>`:''}  <div class="cta-section"><h2>${esc(L.cta_title||'Get Started Today')}</h2><p>${esc(L.cta_desc||'')}</p><a href="${esc(P.stripe_starter_url||'#')}">${esc(L.cta_primary||'Get Early Access')}</a>${tH?`<div class="cta-trust">${tH}</div>`:''}</div>`;}
function renderDemo(){const T=P.tool||{};const out=T.demo_output||{};const mH=(out.metrics||[]).map(m=>`<div class="metric-card"><div class="metric-value">${esc(m.value)}</div><div class="metric-label">${esc(m.label)}</div><div class="metric-trend">${esc(m.trend||'')}</div></div>`).join('');const tbl=out.table||{};const hdrs=(tbl.headers||[]).map(h=>`<th>${esc(h)}</th>`).join('');const rows=(tbl.rows||[]).map(r=>`<tr>${r.map(c=>{if(c&&typeof c==='object'&&c.badge)return`<td><span class="badge ${c.color||'green'}">${esc(c.text)}</span></td>`;return`<td>${esc(c)}</td>`}).join('')}</tr>`).join('');const fi=out.findings||{};const fiH=(fi.items||[]).map(f=>`<div class="finding-item"><div class="finding-dot ${esc(f.severity)}"></div><div><div class="finding-title">${esc(f.title)}</div><div class="finding-detail">${esc(f.detail||'')}</div>${f.action?`<div class="finding-action">→ ${esc(f.action)}</div>`:''}</div></div>`).join('');const inH=(T.inputs||[]).map(i=>`<div class="demo-input-group"><label>${esc(i.label)}</label><input type="${esc(i.type||'text')}" id="demo_${esc(i.id)}" placeholder="${esc(i.placeholder||'')}" value="${esc(i.demo||i.default||'')}"></div>`).join('');document.getElementById('page-demo').innerHTML=`<div class="demo-page"><div class="demo-form-card"><h2>${esc(T.form_title||'See it in action')}</h2><p style="font-size:14px;color:var(--text-muted);margin-bottom:20px;">${esc(T.description||'')}</p><div class="demo-inputs">${inH}</div><button class="demo-btn" onclick="runDemo()">${esc(T.button_label||'⚡ Generate Report')}</button></div><div class="demo-results" id="demoResults"><div class="metrics-grid">${mH}</div>${tbl.headers?`<table class="result-table"><thead><tr>${hdrs}</tr></thead><tbody>${rows}</tbody></table>`:''}${fi.items?`<div class="findings"><div class="findings-header">${esc(fi.title||'AI Assessment')}</div>${fiH}</div>`:''}</div></div>`;}
function runDemo(){const r=document.getElementById('demoResults');if(r){r.classList.add('visible');r.scrollIntoView({behavior:'smooth',block:'start'});}}
function renderSales(){const S=P.sales;if(!S){document.getElementById('page-sales').innerHTML='<div class="empty-state"><p>No sales data.</p></div>';return;}const emails=[{label:'Cold Email #1',badge:'Day 1',text:S.cold_email_1},{label:'Follow-up',badge:'Day 3',text:S.followup_day3},{label:'Follow-up',badge:'Day 7',text:S.followup_day7},{label:'Break-up Email',badge:'Final',text:S.breakup}].filter(e=>e.text);const eH=emails.map(e=>`<div class="email-card"><div class="email-card-header"><span class="email-card-label">${esc(e.label)}</span><span class="email-badge">${esc(e.badge)}</span></div><div class="email-body">${esc(e.text)}</div><button class="copy-btn" onclick="copyText(${JSON.stringify(e.text)},this)">📋 Copy</button></div>`).join('');const lH=S.linkedin?`<div class="linkedin-card"><h3>💼 LinkedIn</h3><div class="linkedin-body">${esc(S.linkedin)}</div><button class="copy-btn" onclick="copyText(${JSON.stringify(S.linkedin)},this)" style="margin:12px 0 0;">📋 Copy</button></div>`:'';const oH=(S.objections||[]).map(o=>`<div class="objection-card"><div class="objection-q">${esc(o.objection||o.q||'')}</div><div class="objection-a">${esc(o.response||o.a||'')}</div></div>`).join('');document.getElementById('page-sales').innerHTML=`<div class="sales-page"><h1>Sales Pack</h1><p class="page-sub">Ready-to-send outbound emails and objection handlers for ${esc(P.name||'this product')}.</p>${eH}${lH}${oH?`<div class="objections-section"><h2>Objection Handlers</h2>${oH}</div>`:''}</div>`;}
function renderFulfillment(){const F=P.fulfillment;if(!F){document.getElementById('page-fulfillment').innerHTML='<div class="empty-state"><p>No fulfillment data.</p></div>';return;}const sH=(F.steps||[]).map((s,i)=>`<div class="onboard-step"><div class="onboard-num">${i+1}</div><div class="onboard-text">${esc(s)}</div></div>`).join('');const gH=(F.customer_gets||[]).map(g=>`<div class="gets-item">${esc(g)}</div>`).join('');document.getElementById('page-fulfillment').innerHTML=`<div class="fulfillment-page"><h1>Fulfillment</h1><p class="page-sub">From signup to first value.</p>${sH?`<div class="onboarding-steps"><h2>⚡ Onboarding Steps</h2>${sH}</div>`:''}${F.first_value_timing?`<div class="first-value-box" style="margin-bottom:32px;"><div class="first-value-icon">🚀</div><div><div class="first-value-label">First Value Timing</div><div class="first-value-text">${esc(F.first_value_timing)}</div></div></div>`:''}${F.ai_role?`<div class="ai-role-section"><h2>🤖 AI Role</h2><div class="ai-role-body">${esc(F.ai_role)}</div></div>`:''}${gH?`<div class="customer-gets-section"><h2>📦 What the Customer Gets</h2><div class="gets-grid">${gH}</div></div>`:''}</div>`;}
function renderReadiness(){const R=P.readiness;if(!R){document.getElementById('page-readiness').innerHTML='<div class="empty-state"><p>No readiness data.</p></div>';return;}const score=R.total_score||0;const rec=R.recommendation||'human_review';const rl={approve:'✅ Approved',human_review:'👀 Human Review',reject:'❌ Rejected'};const dims=[['icp_clarity','ICP Clarity',10],['pain_severity','Pain Severity',10],['offer_strength','Offer Strength',10],['mrr_logic','MRR Logic',10],['fulfillment_readiness','Fulfillment Readiness',8],['product_readiness','Product Readiness',8],['market_clarity','Market Clarity',7],['sales_readiness','Sales Readiness',7],['payment_readiness','Payment Readiness',6],['support_readiness','Support Readiness',5],['legal_readiness','Legal Readiness',5],['retention_potential','Retention Potential',5],['scale_potential','Scale Potential',5],['risk_safety_score','Risk Safety Score',4]];const dH=dims.map(([k,l,m])=>{const v=typeof R[k]==='number'?R[k]:0;const p=Math.round((v/m)*100);const c=p>=75?'high':p>=50?'mid':'low';return`<div class="dim-row"><div class="dim-name">${esc(l)}</div><div class="dim-bar-wrap"><div class="dim-bar ${c}" style="width:${p}%"></div></div><div class="dim-score">${v}/${m}</div></div>`;}).join('');document.getElementById('page-readiness').innerHTML=`<div class="readiness-page"><h1>Readiness Score</h1><p class="page-sub">AI-powered assessment across 14 dimensions.</p><div class="score-hero"><div class="score-number">${score}</div><div class="score-label">out of 100</div><div class="score-badge ${rec}">${rl[rec]||rec}</div>${R.summary?`<div class="score-summary">${esc(R.summary)}</div>`:''}</div><div class="dims-grid">${dH}</div></div>`;}
renderLanding();renderDemo();renderSales();renderFulfillment();renderReadiness();
</script>
</body>
