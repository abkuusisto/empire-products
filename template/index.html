<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loading...</title>
<style>
:root{--bg:#0a0a0f;--bg2:#13131a;--bg3:#1c1c26;--border:#2a2a38;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#f1f5f9;--muted:#94a3b8;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--accent2);text-decoration:none}
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px}
.nav-logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent2),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--muted);transition:all .15s}
.nav-tab:hover{background:var(--bg3);color:var(--text)}
.nav-tab.active{background:var(--accent);color:#fff}
.nav-cta{background:var(--accent);color:#fff;padding:7px 16px;border-radius:8px;font-weight:600;font-size:13px;border:none;cursor:pointer}
.page{display:none}.page.active{display:block}
.hero{padding:80px 24px 64px;text-align:center;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(99,102,241,.15),transparent)}
.hero h1{font-size:clamp(28px,4.5vw,54px);font-weight:900;line-height:1.1;letter-spacing:-1.5px;max-width:820px;margin:0 auto 20px;background:linear-gradient(135deg,#fff 0%,var(--muted) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:clamp(15px,2vw,19px);color:var(--muted);max-width:600px;margin:0 auto 36px}
.hero-cta{display:inline-block;background:var(--accent);color:#fff;padding:14px 32px;border-radius:10px;font-weight:700;font-size:17px}
.trust-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:8px 20px;padding:20px 24px;border-bottom:1px solid var(--border)}
.trust-item{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.trust-item::before{content:'✓';color:var(--green);font-weight:700}
.section{max-width:1100px;margin:0 auto;padding:56px 24px}
.section-title{font-size:26px;font-weight:800;text-align:center;margin-bottom:36px;letter-spacing:-.5px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px;transition:border-color .2s}
.card:hover{border-color:var(--accent)}
.card-icon{font-size:26px;margin-bottom:10px}
.card-title{font-weight:700;margin-bottom:6px;font-size:15px}
.card-desc{font-size:13px;color:var(--muted);line-height:1.6}
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px}
.step{text-align:center}
.step-num{width:40px;height:40px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;margin:0 auto 12px}
.step-title{font-weight:700;font-size:14px}
.step-desc{font-size:13px;color:var(--muted);margin-top:4px}
.testimonials{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.testimonial{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px}
.testimonial-text{font-style:italic;color:var(--muted);margin-bottom:14px;font-size:14px;line-height:1.7}
.testimonial-author{font-weight:700;font-size:13px}
.testimonial-role{font-size:12px;color:var(--muted)}
.plans{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;max-width:880px;margin:0 auto}
.plan{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;position:relative}
.plan.popular{border-color:var(--accent);background:linear-gradient(180deg,rgba(99,102,241,.08),var(--bg2))}
.plan-badge{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;white-space:nowrap}
.plan-name{font-size:16px;font-weight:800;margin-bottom:4px}
.plan-price{font-size:30px;font-weight:900;color:var(--accent2);margin:10px 0 6px}
.plan-desc{font-size:13px;color:var(--muted);margin-bottom:18px}
.plan-feats{list-style:none;margin-bottom:20px}
.plan-feats li{font-size:13px;padding:4px 0;display:flex;gap:8px;align-items:flex-start;color:var(--muted)}
.plan-feats li::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0;margin-top:1px}
.plan-btn{display:block;text-align:center;background:var(--accent);color:#fff;padding:11px;border-radius:8px;font-weight:700;font-size:14px}
.faq{max-width:700px;margin:0 auto}
.faq-item{border-bottom:1px solid var(--border);padding:18px 0}
.faq-q{font-weight:700;margin-bottom:7px;font-size:15px}
.faq-a{font-size:14px;color:var(--muted);line-height:1.7}
.cta-band{text-align:center;padding:60px 24px;background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(129,140,248,.06));border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.cta-band h2{font-size:28px;font-weight:800;margin-bottom:10px}
.cta-band p{color:var(--muted);margin-bottom:28px;font-size:16px}
.cta-band a{background:var(--accent);color:#fff;padding:14px 32px;border-radius:10px;font-weight:700;font-size:17px;display:inline-block}
.demo-wrap{max-width:860px;margin:0 auto;padding:40px 24px}
.demo-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:24px}
.demo-card h2{font-size:20px;font-weight:800;margin-bottom:6px}
.demo-card p{font-size:14px;color:var(--muted);margin-bottom:20px}
.demo-inputs{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.demo-inputs label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--muted)}
.demo-inputs input{width:100%;padding:9px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;font-size:14px;color:var(--text)}
.demo-btn{background:var(--accent);color:#fff;padding:11px 26px;border-radius:8px;font-weight:700;border:none;cursor:pointer;font-size:15px}
.demo-out{display:none}.demo-out.show{display:block}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center}
.metric-val{font-size:26px;font-weight:900;color:var(--accent2)}
.metric-lbl{font-size:12px;font-weight:600;margin:4px 0 2px}
.metric-trend{font-size:11px;color:var(--muted)}
.result-tbl{width:100%;border-collapse:collapse;background:var(--bg2);border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:20px}
.result-tbl th{background:var(--bg3);padding:11px 15px;font-size:12px;font-weight:700;text-align:left;color:var(--muted)}
.result-tbl td{padding:11px 15px;border-top:1px solid var(--border);font-size:13px}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge.green{background:rgba(34,197,94,.15);color:var(--green)}
.badge.red{background:rgba(239,68,68,.15);color:var(--red)}
.findings-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.findings-head{padding:14px 18px;background:var(--bg3);font-weight:700;font-size:14px;border-bottom:1px solid var(--border)}
.finding{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:12px;align-items:flex-start}
.fdot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.fdot.critical{background:var(--red)}.fdot.good{background:var(--green)}
.ftitle{font-weight:700;font-size:13px;margin-bottom:2px}
.fdetail{font-size:12px;color:var(--muted)}
.faction{font-size:12px;color:var(--accent2);margin-top:3px}
.inner{max-width:860px;margin:0 auto;padding:40px 24px}
.page-h1{font-size:26px;font-weight:800;margin-bottom:6px}
.page-sub{color:var(--muted);font-size:14px;margin-bottom:28px}
.email-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.email-head{background:var(--bg3);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.email-label{font-weight:700;font-size:13px}
.email-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
.email-body{padding:18px;white-space:pre-wrap;font-size:13px;line-height:1.8;color:var(--muted);font-family:inherit}
.copy-btn{display:inline-flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;margin:0 18px 14px;color:var(--text)}
.li-card{background:rgba(99,102,241,.07);border:1px solid rgba(99,102,241,.25);border-radius:var(--radius);padding:18px;margin:20px 0}
.li-card h3{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--accent2)}
.li-body{font-size:13px;color:var(--muted);line-height:1.7;white-space:pre-wrap}
.obj-section h2{font-size:20px;font-weight:700;margin:32px 0 16px}
.obj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.obj-q{padding:13px 18px;background:rgba(245,158,11,.07);border-bottom:1px solid var(--border);font-weight:700;font-size:13px;color:var(--yellow)}
.obj-a{padding:13px 18px;font-size:13px;color:var(--muted);line-height:1.7}
.onboard-steps h2,.ful-section h2{font-size:18px;font-weight:700;margin-bottom:16px}
.onboard-step{display:flex;gap:14px;margin-bottom:14px}
.ob-num{width:30px;height:30px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.ob-text{padding-top:5px;font-size:13px;color:var(--muted);line-height:1.6}
.gets-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.gets-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px}
.gets-item::before{content:'✅';font-size:14px}
.ai-box{background:rgba(99,102,241,.07);border:1px solid rgba(99,102,241,.2);border-radius:var(--radius);padding:20px;margin:24px 0}
.ai-box h2{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--accent2)}
.ai-box p{font-size:13px;color:var(--muted);line-height:1.8}
.fv-box{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);border-radius:var(--radius);padding:18px;display:flex;gap:14px;align-items:flex-start;margin:24px 0}
.fv-icon{font-size:26px}.fv-label{font-weight:700;font-size:14px;margin-bottom:4px}
.fv-text{font-size:13px;color:var(--muted)}
.score-hero{text-align:center;background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(129,140,248,.05));border:1px solid rgba(99,102,241,.2);border-radius:14px;padding:36px 20px;margin-bottom:28px}
.score-num{font-size:80px;font-weight:900;background:linear-gradient(135deg,var(--accent2),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.score-lbl{font-size:16px;font-weight:700;color:var(--muted);margin:6px 0}
.score-badge{display:inline-block;padding:5px 18px;border-radius:20px;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.5px;margin:8px 0}
.score-badge.approve{background:rgba(34,197,94,.15);color:var(--green)}
.score-badge.human_review{background:rgba(245,158,11,.15);color:var(--yellow)}
.score-badge.reject{background:rgba(239,68,68,.15);color:var(--red)}
.score-summary{max-width:580px;margin:12px auto 0;font-size:13px;color:var(--muted);line-height:1.7}
.dims{display:grid;gap:10px}
.dim-row{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px 16px}
.dim-name{min-width:190px;font-size:13px;font-weight:600}
.dim-bar-wrap{flex:1;background:var(--bg3);border-radius:99px;height:8px;overflow:hidden}
.dim-bar{height:100%;border-radius:99px;transition:width 1s ease}
.dim-bar.high{background:var(--green)}.dim-bar.mid{background:var(--yellow)}.dim-bar.low{background:var(--red)}
.dim-score{min-width:50px;text-align:right;font-size:13px;font-weight:700;color:var(--muted)}
.empty{text-align:center;padding:60px 24px;color:var(--muted)}
.sdiv{height:1px;background:var(--border);margin:0}
footer{text-align:center;padding:28px 24px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
@media(max-width:640px){.demo-inputs{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.nav-tab{padding:5px 9px;font-size:12px}.dim-name{min-width:120px;font-size:12px}}
</style>
</head>
<body>
<nav class="nav"><div class="nav-inner"><div class="nav-logo" id="NL">…</div><div class="nav-tabs"><button class="nav-tab active" onclick="show('landing')">Landing</button><button class="nav-tab" onclick="show('demo')">Demo</button><button class="nav-tab" onclick="show('sales')">Sales</button><button class="nav-tab" onclick="show('fulfillment')">Fulfillment</button><button class="nav-tab" onclick="show('readiness')">Readiness</button></div><button class="nav-cta" id="NC" onclick="document.getElementById('HCTA').scrollIntoView({behavior:'smooth'})">Get Started</button></div></nav>
<div id="page-landing" class="page active"></div>
<div id="page-demo" class="page"></div>
<div id="page-sales" class="page"></div>
<div id="page-fulfillment" class="page"></div>
<div id="page-readiness" class="page"></div>
<footer><p>A <strong>Qsisto</strong> portfolio product &middot; AB Empire Oy (Y-tunnus: 3499735-5) &middot; <a href="mailto:support@qsisto.com">support@qsisto.com</a></p></footer>
<script>
const P=PRODUCT_JSON_PLACEHOLDER;
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function copy(t,b){navigator.clipboard.writeText(t).then(()=>{const o=b.innerHTML;b.innerHTML='✓ Copied!';setTimeout(()=>b.innerHTML=o,1500);});}
function show(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.getElementById('page-'+n).classList.add('active');document.querySelectorAll('.nav-tab').forEach(t=>{if(t.getAttribute('onclick')&&t.getAttribute('onclick').includes("'"+n+"'"))t.classList.add('active');});}
function rLanding(){const L=P.landing||{},name=esc(P.name||'Product');document.title=name;document.getElementById('NL').textContent=name;const nc=document.getElementById('NC');if(nc)nc.textContent=esc(L.cta_primary||'Get Started');const tH=(L.trust_items||[]).map(t=>`<span class="trust-item">${esc(t)}</span>`).join('');const spH=(L.social_proof||[]).map(t=>`<div class="testimonial"><div class="testimonial-text">"${esc(t.quote||t)}"</div><div class="testimonial-author">${esc(t.name||'Beta User')}</div><div class="testimonial-role">${esc(t.role||'Early Adopter')}</div></div>`).join('');const prH=(L.problems||[]).map(p=>`<div class="card"><div class="card-icon">${p.icon||'⚠️'}</div><div class="card-title">${esc(p.title||'')}</div><div class="card-desc">${esc(p.desc||'')}</div></div>`).join('');const hwH=(L.how_steps||[]).map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div class="step-title">${esc(s.title||s)}</div>${s.desc?`<div class="step-desc">${esc(s.desc)}</div>`:''}</div>`).join('');const ftH=(L.features||[]).map(f=>`<div class="card"><div class="card-icon">${f.icon||'✨'}</div><div class="card-title">${esc(f.title||f.name||'')}</div><div class="card-desc">${esc(f.desc||f.description||'')}</div></div>`).join('');const plH=(L.plans||[]).map(pl=>`<div class="plan${pl.popular?' popular':''}"> ${pl.popular?'<div class="plan-badge">Most Popular</div>':''}<div class="plan-name">${esc(pl.name)}</div><div class="plan-price">${esc(pl.price)}</div><div class="plan-desc">${esc(pl.desc||'')}</div><ul class="plan-feats">${(pl.features||[]).map(f=>`<li>${esc(f)}</li>`).join('')}</ul><a href="${esc(P.stripe_starter_url||P.stripe_pro_url||'#')}" class="plan-btn">${esc(pl.cta||'Get Started')}</a></div>`).join('');const fqH=(L.faq||[]).map(f=>`<div class="faq-item"><div class="faq-q">${esc(f.q||'')}</div><div class="faq-a">${esc(f.a||'')}</div></div>`).join('');document.getElementById('page-landing').innerHTML=`<div class="hero"><h1>${esc(L.headline||name)}</h1><p>${esc(L.subheadline||'')}</p><a href="#" class="hero-cta" id="HCTA">${esc(L.cta_primary||'Get Started')}</a></div>${tH?`<div class="trust-bar">${tH}</div>`:''}${spH?`<div class="section"><div class="testimonials">${spH}</div></div><div class="sdiv"></div>`:''}${prH?`<div class="section"><h2 class="section-title">${esc(L.problem_title||'Sound Familiar?')}</h2><div class="grid-3">${prH}</div></div><div class="sdiv"></div>`:''}${hwH?`<div class="section"><h2 class="section-title">How It Works</h2><div class="steps">${hwH}</div></div><div class="sdiv"></div>`:''}${ftH?`<div class="section"><h2 class="section-title">${esc(L.features_title||'Features')}</h2><div class="grid-3">${ftH}</div></div><div class="sdiv"></div>`:''}${plH?`<div class="section"><h2 class="section-title">Simple Pricing</h2><div class="plans">${plH}</div></div><div class="sdiv"></div>`:''}${fqH?`<div class="section"><h2 class="section-title">FAQ</h2><div class="faq">${fqH}</div></div><div class="sdiv"></div>`:''}  <div class="cta-band"><h2>${esc(L.cta_title||'Get Started Today')}</h2><p>${esc(L.cta_desc||'')}</p><a href="${esc(P.stripe_starter_url||'#')}">${esc(L.cta_primary||'Get Started')}</a></div>`;}
function rDemo(){const T=P.tool||{},out=T.demo_output||{};const mH=(out.metrics||[]).map(m=>`<div class="metric"><div class="metric-val">${esc(m.value)}</div><div class="metric-lbl">${esc(m.label)}</div><div class="metric-trend">${esc(m.trend||'')}</div></div>`).join('');const tbl=out.table||{};const hH=(tbl.headers||[]).map(h=>`<th>${esc(h)}</th>`).join('');const rH=(tbl.rows||[]).map(r=>`<tr>${r.map(c=>{if(c&&typeof c==='object'&&c.badge)return`<td><span class="badge ${c.color||'green'}">${esc(c.text)}</span></td>`;return`<td>${esc(c)}</td>`;}).join('')}</tr>`).join('');const fi=out.findings||{};const fiH=(fi.items||[]).map(f=>`<div class="finding"><div class="fdot ${esc(f.severity)}"></div><div><div class="ftitle">${esc(f.title)}</div><div class="fdetail">${esc(f.detail||'')}</div>${f.action?`<div class="faction">→ ${esc(f.action)}</div>`:''}</div></div>`).join('');const inH=(T.inputs||[]).map(i=>`<div><label>${esc(i.label)}</label><input type="${esc(i.type||'text')}" id="d_${esc(i.id)}" placeholder="${esc(i.placeholder||'')}" value="${esc(i.demo||i.default||'')}"></div>`).join('');document.getElementById('page-demo').innerHTML=`<div class="demo-wrap"><div class="demo-card"><h2>${esc(T.form_title||'See it in action')}</h2><p>${esc(T.description||'')}</p><div class="demo-inputs">${inH}</div><button class="demo-btn" onclick="runDemo()">${esc(T.button_label||'⚡ Generate Report')}</button></div><div class="demo-out" id="DO"><div class="metrics">${mH}</div>${tbl.headers?`<table class="result-tbl"><thead><tr>${hH}</tr></thead><tbody>${rH}</tbody></table>`:''}${fi.items?`<div class="findings-box"><div class="findings-head">${esc(fi.title||'AI Assessment')}</div>${fiH}</div>`:''}</div></div>`;}
function runDemo(){const r=document.getElementById('DO');if(r){r.classList.add('show');r.scrollIntoView({behavior:'smooth',block:'start'});}}
function rSales(){const S=P.sales;if(!S){document.getElementById('page-sales').innerHTML='<div class="empty"><p>No sales data available.</p></div>';return;}const emails=[{label:'Cold Email #1',badge:'Day 1',text:S.cold_email_1},{label:'Follow-up',badge:'Day 3',text:S.followup_day3},{label:'Follow-up',badge:'Day 7',text:S.followup_day7},{label:'Break-up Email',badge:'Final',text:S.breakup}].filter(e=>e.text);const eH=emails.map(e=>`<div class="email-card"><div class="email-head"><span class="email-label">${esc(e.label)}</span><span class="email-badge">${esc(e.badge)}</span></div><div class="email-body">${esc(e.text)}</div><button class="copy-btn" onclick="copy(${JSON.stringify(e.text)},this)">📋 Copy</button></div>`).join('');const lH=S.linkedin?`<div class="li-card"><h3>💼 LinkedIn</h3><div class="li-body">${esc(S.linkedin)}</div><button class="copy-btn" onclick="copy(${JSON.stringify(S.linkedin)},this)" style="margin:10px 0 0">📋 Copy</button></div>`:'';const oH=(S.objections||[]).map(o=>`<div class="obj-card"><div class="obj-q">${esc(o.objection||o.q||'')}</div><div class="obj-a">${esc(o.response||o.a||'')}</div></div>`).join('');document.getElementById('page-sales').innerHTML=`<div class="inner"><h1 class="page-h1">Sales Pack</h1><p class="page-sub">Ready-to-send outbound emails and objection handlers for ${esc(P.name||'this product')}.</p>${eH}${lH}${oH?`<div class="obj-section"><h2>Objection Handlers</h2>${oH}</div>`:''}</div>`;}
function rFulfillment(){const F=P.fulfillment;if(!F){document.getElementById('page-fulfillment').innerHTML='<div class="empty"><p>No fulfillment data available.</p></div>';return;}const sH=(F.steps||[]).map((s,i)=>`<div class="onboard-step"><div class="ob-num">${i+1}</div><div class="ob-text">${esc(s)}</div></div>`).join('');const gH=(F.customer_gets||[]).map(g=>`<div class="gets-item">${esc(g)}</div>`).join('');document.getElementById('page-fulfillment').innerHTML=`<div class="inner"><h1 class="page-h1">Fulfillment</h1><p class="page-sub">From signup to first value.</p>${sH?`<div class="onboard-steps"><h2>⚡ Onboarding Steps</h2>${sH}</div>`:''}${F.first_value_timing?`<div class="fv-box"><div class="fv-icon">🚀</div><div><div class="fv-label">First Value Timing</div><div class="fv-text">${esc(F.first_value_timing)}</div></div></div>`:''}${F.ai_role?`<div class="ai-box"><h2>🤖 AI Role</h2><p>${esc(F.ai_role)}</p></div>`:''}${gH?`<div class="ful-section"><h2>📦 What the Customer Gets</h2><div class="gets-grid">${gH}</div></div>`:''}</div>`;}
function rReadiness(){const R=P.readiness;if(!R){document.getElementById('page-readiness').innerHTML='<div class="empty"><p>No readiness data available.</p></div>';return;}const score=R.total_score||0,rec=R.recommendation||'human_review';const rl={approve:'✅ Approved',human_review:'👀 Human Review',reject:'❌ Rejected'};const dims=[['icp_clarity','ICP Clarity',10],['pain_severity','Pain Severity',10],['offer_strength','Offer Strength',10],['mrr_logic','MRR Logic',10],['fulfillment_readiness','Fulfillment Readiness',8],['product_readiness','Product Readiness',8],['market_clarity','Market Clarity',7],['sales_readiness','Sales Readiness',7],['payment_readiness','Payment Readiness',6],['support_readiness','Support Readiness',5],['legal_readiness','Legal Readiness',5],['retention_potential','Retention Potential',5],['scale_potential','Scale Potential',5],['risk_safety_score','Risk Safety Score',4]];const dH=dims.map(([k,l,m])=>{const v=typeof R[k]==='number'?R[k]:0;const p=Math.round(v/m*100);const c=p>=75?'high':p>=50?'mid':'low';return`<div class="dim-row"><div class="dim-name">${esc(l)}</div><div class="dim-bar-wrap"><div class="dim-bar ${c}" style="width:${p}%"></div></div><div class="dim-score">${v}/${m}</div></div>`;}).join('');document.getElementById('page-readiness').innerHTML=`<div class="inner"><h1 class="page-h1">Readiness Score</h1><p class="page-sub">AI-powered assessment across 14 dimensions.</p><div class="score-hero"><div class="score-num">${score}</div><div class="score-lbl">out of 100</div><div class="score-badge ${rec}">${rl[rec]||rec}</div>${R.summary?`<div class="score-summary">${esc(R.summary)}</div>`:''}</div><div class="dims">${dH}</div></div>`;}
rLanding();rDemo();rSales();rFulfillment();rReadiness();
</script>
