<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgencyScope — Agency Client Intelligence Platform</title>
<style>
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --primary-light: #e0e7ff;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --dark: #0f172a;
    --gray-900: #1e293b;
    --gray-800: #334155;
    --gray-700: #475569;
    --gray-600: #64748b;
    --gray-500: #94a3b8;
    --gray-400: #cbd5e1;
    --gray-300: #e2e8f0;
    --gray-200: #f1f5f9;
    --gray-100: #f8fafc;
    --white: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--gray-100); color: var(--dark); }

  /* SIDEBAR */
  .sidebar {
    position: fixed; left: 0; top: 0; width: 240px; height: 100vh;
    background: var(--dark); display: flex; flex-direction: column;
    z-index: 100; overflow-y: auto;
  }
  .sidebar-logo {
    padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .logo-text { font-size: 22px; font-weight: 800; color: var(--white); letter-spacing: -0.5px; }
  .logo-text span { color: var(--primary); }
  .logo-badge { font-size: 10px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .sidebar-nav { flex: 1; padding: 16px 0; }
  .nav-section { padding: 8px 20px 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--gray-600); font-weight: 600; margin-top: 8px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 20px;
    color: var(--gray-500); cursor: pointer; transition: all 0.15s;
    font-size: 14px; font-weight: 500; border-left: 3px solid transparent;
  }
  .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.05); }
  .nav-item.active { color: var(--white); background: rgba(99,102,241,0.15); border-left-color: var(--primary); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
  .plan-badge {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-radius: 8px; padding: 12px; text-align: center;
  }
  .plan-badge .plan-name { color: var(--white); font-weight: 700; font-size: 13px; }
  .plan-badge .plan-desc { color: rgba(255,255,255,0.7); font-size: 11px; margin-top: 2px; }

  /* MAIN */
  .main { margin-left: 240px; min-height: 100vh; }
  .topbar {
    background: var(--white); border-bottom: 1px solid var(--gray-300);
    padding: 0 32px; height: 64px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 50;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .page-title { font-size: 18px; font-weight: 700; color: var(--dark); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .btn {
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--primary); color: var(--white); }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .btn-outline { background: var(--white); color: var(--gray-700); border: 1.5px solid var(--gray-300); }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
  .btn-danger { background: var(--danger); color: var(--white); }
  .btn-danger:hover { background: #dc2626; }
  .btn-success { background: var(--success); color: var(--white); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    display: flex; align-items: center; justify-content: center;
    color: var(--white); font-weight: 700; font-size: 14px; cursor: pointer;
  }

  /* CONTENT */
  .content { padding: 32px; }
  .page-section { display: none; }
  .page-section.active { display: block; }

  /* STATS ROW */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 28px; }
  .stat-card {
    background: var(--white); border-radius: 12px; padding: 20px;
    border: 1px solid var(--gray-300); position: relative; overflow: hidden;
  }
  .stat-card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--primary);
  }
  .stat-card.green::after { background: var(--success); }
  .stat-card.yellow::after { background: var(--warning); }
  .stat-card.red::after { background: var(--danger); }
  .stat-label { font-size: 12px; color: var(--gray-600); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 28px; font-weight: 800; color: var(--dark); margin: 8px 0 4px; }
  .stat-change { font-size: 12px; font-weight: 600; }
  .stat-change.up { color: var(--success); }
  .stat-change.down { color: var(--danger); }
  .stat-icon { position: absolute; right: 16px; top: 16px; font-size: 28px; opacity: 0.15; }

  /* GRID LAYOUTS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

  /* CARDS */
  .card {
    background: var(--white); border-radius: 12px; border: 1px solid var(--gray-300);
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px; border-bottom: 1px solid var(--gray-200);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title { font-size: 15px; font-weight: 700; color: var(--dark); }
  .card-body { padding: 20px; }

  /* CLIENT CARDS */
  .clients-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .client-card {
    background: var(--white); border-radius: 12px; border: 1px solid var(--gray-300);
    overflow: hidden; transition: all 0.2s; cursor: pointer;
  }
  .client-card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .client-card-header { padding: 20px; display: flex; align-items: center; gap: 14px; }
  .client-logo {
    width: 48px; height: 48px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: var(--white); flex-shrink: 0;
  }
  .client-name { font-size: 15px; font-weight: 700; color: var(--dark); }
  .client-industry { font-size: 12px; color: var(--gray-600); margin-top: 2px; }
  .client-status {
    margin-left: auto; padding: 4px 10px; border-radius: 100px;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .status-active { background: #d1fae5; color: #065f46; }
  .status-at-risk { background: #fef3c7; color: #92400e; }
  .status-paused { background: #f1f5f9; color: var(--gray-600); }
  .status-churned { background: #fee2e2; color: #991b1b; }
  .client-card-body { padding: 0 20px 20px; }
  .client-metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .metric-item { text-align: center; }
  .metric-val { font-size: 16px; font-weight: 800; color: var(--dark); }
  .metric-lbl { font-size: 10px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .client-card-footer {
    padding: 12px 20px; border-top: 1px solid var(--gray-200);
    display: flex; align-items: center; justify-content: space-between;
  }
  .budget-bar-wrap { flex: 1; margin: 0 12px; }
  .budget-label { font-size: 11px; color: var(--gray-600); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .budget-bar { height: 6px; background: var(--gray-200); border-radius: 100px; overflow: hidden; }
  .budget-fill { height: 100%; border-radius: 100px; background: var(--primary); transition: width 0.5s; }
  .budget-fill.warn { background: var(--warning); }
  .budget-fill.danger { background: var(--danger); }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; }
  th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-600); background: var(--gray-100); border-bottom: 1px solid var(--gray-300); }
  td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid var(--gray-200); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--gray-100); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000;
    display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 16px; width: 580px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 60px rgba(0,0,0,0.2);
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--gray-200);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 17px; font-weight: 700; }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--gray-500); line-height: 1; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray-200); display: flex; gap: 10px; justify-content: flex-end; }

  /* FORM */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
  .form-control {
    width: 100%; padding: 9px 12px; border: 1.5px solid var(--gray-300); border-radius: 8px;
    font-size: 14px; color: var(--dark); outline: none; transition: border 0.15s; background: var(--white);
  }
  .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
  select.form-control { cursor: pointer; }

  /* CHARTS (CSS-based) */
  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; padding: 0 4px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--primary); transition: height 0.5s; min-height: 4px; }
  .bar.alt { background: var(--success); }
  .bar-label { font-size: 10px; color: var(--gray-500); white-space: nowrap; }

  .donut-wrap { display: flex; align-items: center; gap: 20px; }
  .donut-chart {
    width: 100px; height: 100px; border-radius: 50%; flex-shrink: 0;
    background: conic-gradient(var(--primary) 0%, var(--primary) 45%, var(--success) 45%, var(--success) 72%, var(--warning) 72%, var(--warning) 88%, var(--gray-300) 88%);
    position: relative;
  }
  .donut-chart::after {
    content: ''; position: absolute; inset: 25px; background: var(--white); border-radius: 50%;
  }
  .donut-legend { flex: 1; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* HEALTH SCORE */
  .health-score {
    display: flex; align-items: center; justify-content: center;
    width: 52px; height: 52px; border-radius: 50%; font-size: 15px; font-weight: 800;
    border: 3px solid var(--success);
  }
  .health-score.med { border-color: var(--warning); color: var(--warning); }
  .health-score.low { border-color: var(--danger); color: var(--danger); }

  /* PROGRESS */
  .progress-list { display: flex; flex-direction: column; gap: 14px; }
  .progress-item {}
  .progress-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .progress-name { font-weight: 600; color: var(--dark); }
  .progress-val { color: var(--gray-600); }
  .progress-bar { height: 8px; background: var(--gray-200); border-radius: 100px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 100px; }

  /* TAGS */
  .tag {
    display: inline-block; padding: 3px 8px; border-radius: 6px;
    font-size: 11px; font-weight: 600; margin-right: 4px;
  }
  .tag-blue { background: #e0e7ff; color: #3730a3; }
  .tag-green { background: #d1fae5; color: #065f46; }
  .tag-orange { background: #fff7ed; color: #9a3412; }
  .tag-purple { background: #f3e8ff; color: #6b21a8; }

  /* ALERTS */
  .alert {
    padding: 12px 16px; border-radius: 8px; font-size: 13px;
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .alert-warning { background: #fffbeb; border: 1px solid #fcd34d; color: #92400e; }
  .alert-danger { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
  .alert-success { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
  .alert-info { background: #eff6ff; border: 1px solid #93c5fd; color: #1e40af; }

  /* TIMELINE */
  .timeline { position: relative; padding-left: 24px; }
  .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--gray-300); }
  .timeline-item { position: relative; margin-bottom: 20px; }
  .timeline-dot {
    position: absolute; left: -20px; top: 3px;
    width: 12px; height: 12px; border-radius: 50%; background: var(--primary); border: 2px solid var(--white);
    box-shadow: 0 0 0 2px var(--primary);
  }
  .timeline-dot.green { background: var(--success); box-shadow: 0 0 0 2px var(--success); }
  .timeline-dot.yellow { background: var(--warning); box-shadow: 0 0 0 2px var(--warning); }
  .timeline-time { font-size: 11px; color: var(--gray-500); margin-bottom: 4px; }
  .timeline-text { font-size: 13px; color: var(--dark); font-weight: 500; }

  /* DETAIL MODAL */
  .detail-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--gray-300); margin-bottom: 20px; }
  .detail-tab { padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; color: var(--gray-600); margin-bottom: -1px; }
  .detail-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* KPILIST */
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .kpi-box { background: var(--gray-100); border-radius: 8px; padding: 14px; text-align: center; }
  .kpi-box-val { font-size: 20px; font-weight: 800; color: var(--dark); }
  .kpi-box-lbl { font-size: 11px; color: var(--gray-600); margin-top: 2px; }
  .kpi-trend { font-size: 11px; margin-top: 4px; font-weight: 600; }
  .kpi-trend.up { color: var(--success); }
  .kpi-trend.down { color: var(--danger); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-icon { font-size: 56px; margin-bottom: 16px; }
  .empty-title { font-size: 18px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
  .empty-desc { font-size: 14px; color: var(--gray-600); max-width: 360px; margin: 0 auto 20px; }

  /* PRICING SECTION */
  #pricing-section {
    background: linear-gradient(135deg, var(--dark) 0%, #1a1040 100%);
    padding: 80px 32px; margin-left: 240px;
  }
  .pricing-header { text-align: center; margin-bottom: 48px; }
  .pricing-header h2 { font-size: 36px; font-weight: 800; color: var(--white); margin-bottom: 12px; }
  .pricing-header p { font-size: 16px; color: var(--gray-500); max-width: 480px; margin: 0 auto; }
  .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 960px; margin: 0 auto; }
  .pricing-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 32px; color: var(--white); position: relative;
    transition: transform 0.2s;
  }
  .pricing-card:hover { transform: translateY(-4px); }
  .pricing-card.featured {
    background: var(--primary); border-color: var(--primary);
    box-shadow: 0 20px 60px rgba(99,102,241,0.4);
  }
  .popular-badge {
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    background: var(--warning); color: var(--dark); font-size: 11px; font-weight: 800;
    padding: 4px 12px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .pricing-name { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; margin-bottom: 8px; }
  .pricing-price { font-size: 44px; font-weight: 900; margin-bottom: 4px; }
  .pricing-price span { font-size: 18px; font-weight: 500; vertical-align: top; margin-top: 10px; display: inline-block; }
  .pricing-period { font-size: 13px; opacity: 0.7; margin-bottom: 24px; }
  .pricing-features { list-style: none; margin-bottom: 28px; }
  .pricing-features li { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .pricing-features li::before { content: '✓'; font-weight: 800; color: var(--success); font-size: 13px; }
  .pricing-features li.no::before { content: '✕'; color: rgba(255,255,255,0.3); }
  .pricing-features li.no { opacity: 0.5; }
  .btn-pricing {
    width: 100%; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700;
    cursor: pointer; border: 2px solid rgba(255,255,255,0.3); background: transparent;
    color: var(--white); transition: all 0.15s;
  }
  .btn-pricing:hover { background: rgba(255,255,255,0.1); }
  .btn-pricing.featured { background: var(--white); color: var(--primary); border-color: var(--white); }
  .btn-pricing.featured:hover { background: var(--primary-light); }

  /* NOTIFICATION DOT */
  .notif-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--danger);
    position: absolute; top: 8px; right: 8px;
  }

  /* MISC */
  .flex { display: flex; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .mb-4 { margin-bottom: 16px; }
  .mb-6 { margin-bottom: 24px; }
  .text-sm { font-size: 13px; }
  .text-muted { color: var(--gray-600); }
  .font-bold { font-weight: 700; }
  .search-box {
    padding: 8px 12px; border: 1.5px solid var(--gray-300); border-radius: 8px;
    font-size: 13px; width: 220px; outline: none;
  }
  .search-box:focus { border-color: var(--primary); }

  @media (max-width: 1200px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .clients-grid { grid-template-columns: repeat(2, 1fr); }
    .pricing-grid { grid-template-columns: 1fr; max-width: 400px; }
    .grid-2 { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .main { margin-left: 0; }
    #pricing-section { margin-left: 0; }
    .clients-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
