detail":"Current process costs 20+ hours/month in avoidable work","action":"Automate with SlotSnap — setup in 24 hours"},{"severity":"good","title":"Strong ROI potential","detail":"Estimated 8x return on investment in first 90 days"}]}}},"sales":{"cold_email_1":"Hi {{First Name}},\n\nI noticed {{Company}} is actively hiring — congrats on the growth.\n\nQuick question: how much time does your team spend just coordinating interview schedules each week?\n\nFor most HR managers at companies your size, it's 5–7 hours. That's chasing candidates for availability, syncing calendars, sending reminders, and rescheduling no-shows.\n\nWe built SlotSnap specifically for HR teams at 50–200 person companies. You generate a booking link per role, candidates self-schedule into interviewer availability, and reminders + reschedules happen automatically.\n\nMost customers get those 5 hours back within the first week.\n\nWorth a 15-minute look?\n\n{{Your Name}}\nSlotSnap — Interview Scheduling on Autopilot","followup_day3":"Hi {{First Name}},\n\nQuick follow-up — did the scheduling pain resonate?\n\nThe math I keep coming back to: 5 hrs/week × €35 loaded cost = €700/month just in scheduling overhead. SlotSnap Growth is €249.\n\nWe handle setup in one 20-minute call. You're running live bookings the same day.\n\nHappy to show you a 10-minute demo this week?\n\n{{Your Name}}","followup_day7":"Hi {{First Name}},\n\nLast note on this — I know your inbox is full.\n\nOne thing worth knowing: the biggest hidden cost in interview scheduling isn't recruiter time — it's candidate drop-off. Every day a scheduling chain takes adds risk that your best candidate accepts another offer.\n\nSlotSnap closes that gap. Candidates book instantly. You never lose someone to a 3-day email thread.\n\nFree 14-day trial, no credit card. If the timing's wrong, no worries — I'll check back when you're in a heavier hiring cycle.\n\n{{Your Name}}","breakup":"Hi {{First Name}},\n\nI'll stop reaching out after this — I don't want to be noise.\n\nIf scheduling ever becomes a bottleneck again (or you're suddenly filling 5+ roles at once), SlotSnap is at slotsnap.io. 14-day free trial, 48-hour setup.\n\nWishing {{Company}} a great hiring season.\n\n{{Your Name}}","linkedin":"Hi {{First Name}} — saw {{Company}} is growing the team. I work on SlotSnap, a tool built specifically for HR managers spending too many hours on interview scheduling coordination. If that's a pain point right now, I'd love to share how teams your size are getting 5+ hours back per week. Happy to send a quick overview if useful?","objections":[{"objection":"We already use Calendly","response":"Calendly is great for 1:1 meetings, but it wasn't built for recruiting workflows. SlotSnap handles panel interviews across multiple interviewers, syncs bi-directionally with your ATS, automates no-show recovery, and gives you scheduling funnel analytics. It's purpose-built for HR — not a generic scheduler."},{"objection":"Our ATS already has scheduling features","response":"Most ATS scheduling modules are basic — they push calendar invites but don't handle panel coordination, no-show automation, or candidate self-reschedule. SlotSnap works alongside your ATS to fill that gap, and the integration takes 10 minutes to set up."},{"objection":"We don't have budget right now","response":"Totally fair. The ROI case is usually pretty direct: if scheduling costs your team 5 hours/week at €35/hr loaded, that's €700/month in overhead. Starter plan is €99. But if budget is tight, start the 14-day free trial — you'll have real data on hours saved before you need to commit."},{"objection":"We're not hiring that much right now","response":"Perfect time to set it up, then. When hiring ramps up — and it always does — you'll already be configured and your interviewers will be connected. Takes 48 hours to set up and costs nothing to trial."},{"objection":"I'd need to get IT involved for integrations","response":"No IT needed. Calendar connections are OAuth (like signing in with Google). ATS integrations are API key-based — we guide you through it in your onboarding call in under 10 minutes. No dev work required."}]},"fulfillment":{"steps":["Customer completes signup and OAuth calendar connection (self-serve, ~4 min)","Automated welcome email with onboarding call booking link (SlotSnap scheduling its own onboarding — product dogfood)","Onboarding specialist joins 20-min call: configures first 3 active job roles, sets interviewer availability, connects ATS","Test booking link sent internally to validate end-to-end flow","First live candidate booking link generated and handed to customer","Day 7 automated metrics email: interviews booked, hours estimated saved, no-show rate","Day 14 success check-in call: confirm value, address friction, present upgrade path if on Starter","Ongoing: weekly scheduling health digest email to HR manager, proactive CSM outreach if activity drops"],"ai_role":"AI powers slot matching optimization (learns interviewer preferences over time), suggests optimal interview windows based on historical booking completion rates, generates reschedule suggestions for no-shows, and flags scheduling funnel bottlenecks in the analytics dashboard.","customer_gets":"A fully operational interview scheduling automation system integrated with their calendar and ATS, producing confirmed interviews without manual coordination, with automated reminders and no-show recovery running in the background.","first_value_timing":"First confirmed interview booked automatically within 48 hours of signup"},"readiness":{"icp_clarity":9,"pain_severity":9,"offer_strength":9,"mrr_logic":9,"fulfillment_readiness":7,"product_readiness":7,"market_clarity":7,"sales_readiness":8,"payment_readiness":6,"support_readiness":5,"legal_readiness":5,"retention_potential":5,"scale_potential":5,"risk_safety_score":4,"total_score":94,"recommendation":"approve","summary":"SlotSnap is a high-readiness MRR business targeting a clearly defined ICP with a quantifiable, recurring pain point. The scheduling pain is real, measurable (5+ hrs/week), and present every week — creating strong natural retention. The ROI case is immediate and easy to communicate. The market has established players (Calendly, Cronofy, GoodTime) confirming demand, but none fully own the 50–200 person HR manager segment with a purpose-built, ATS-integrated, no-show-recovery-first product. The three-tier pricing at €99/€249/€499 creates clear upgrade paths. Primary risk is integration depth — ATS bi-directional sync requires engineering investment to be fully delivered, so beta positioning must be honest. Outbound motion is well-targeted using hiring activity as a trigger signal. Kill criteria are conservative and achievable within 90 days with disciplined outreach. Recommend launching with 10 beta customers at Starter/Growth pricing in exchange for case studies, then scaling outbound once NPS baseline is confirmed."},"stripe_starter_url":"","stripe_pro_url":"","stripe_premium_url":""};
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function copyText(t,b){navigator.clipboard.writeText(t).then(()=>{const o=b.innerHTML;b.innerHTML='✓ Copied!';setTimeout(()=>{b.innerHTML=o;},1500);});}
function showPage(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.getElementById('page-'+n).classList.add('active');document.querySelectorAll('.nav-tab').forEach(t=>{if(t.getAttribute('onclick')&&t.getAttribute('onclick').includes("'"+n+"'"))t.classList.add('active');});}
function renderLanding(){const L=P.landing||{};const name=esc(P.name||'Product');document.title=name;document.getElementById('navLogo').textContent=name;const nCta=document.getElementById('navCta');if(nCta)nCta.textContent=esc(L.cta_primary||'Get Early Access');const tH=(L.trust_items||[]).map(t=>`<span class="trust-item">${esc(t)}</span>`).join('');const spH=(L.social_proof||[]).map(t=>`<div class="testimonial"><div class="testimonial-text">"${esc(t.quote||t)}"</div><div class="testimonial-author">${esc(t.name||'Beta User')}</div><div class="testimonial-role">${esc(t.role||'Early Adopter')}</div></div>`).join('');const prH=(L.problems||[]).map(p=>`<div class="problem-card"><div class="problem-icon">${p.icon||'⚠️'}</div><div class="problem-title">${esc(p.title||'')}</div><div class="problem-desc">${esc(p.desc||'')}</div></div>`).join('');const hwH=(L.how_steps||[]).map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div class="step-title">${esc(s.title||s)}</div>${s.desc?`<div class="step-desc">${esc(s.desc)}</div>`:''}</div>`).join('');const ftH=(L.features||[]).map(f=>`<div class="feature-card"><div class="feature-icon">${f.icon||'✨'}</div><div class="feature-title">${esc(f.title||f.name||'')}</div><div class="feature-desc">${esc(f.desc||f.description||'')}</div></div>`).join('');const plH=(L.plans||[]).map(pl=>`<div class="plan-card${pl.popular?' popular':''}"> ${pl.popular?'<div class="popular-badge">Most Popular</div>':''}<div class="plan-name">${esc(pl.name)}</div><div class="plan-price">${esc(pl.price)}</div><div class="plan-desc">${esc(pl.desc||'')}</div><ul class="plan-features">${(pl.features||[]).map(f=>`<li>${esc(f)}</li>`).join('')}</ul><a href="${esc(P.stripe_starter_url||P.stripe_pro_url||'#')}" class="plan-cta">${esc(pl.cta||'Get Started')}</a></div>`).join('');const fqH=(L.faq||[]).map(f=>`<div class="faq-item"><div class="faq-q">${esc(f.q||'')}</div><div class="faq-a">${esc(f.a||'')}</div></div>`).join('');document.getElementById('page-landing').innerHTML=`<div class="hero"><h1>${esc(L.headline||name)}</h1><p>${esc(L.subheadline||'')}</p><a href="#" class="hero-cta" id="heroCTABtn">${esc(L.cta_primary||'Get Early Access')}</a></div>${tH?`<div class="trust-bar">${tH}</div>`:''}${spH?`<div class="section"><div class="testimonials-grid">${spH}</div></div>`:''}${prH?`<div style="background:var(--gray-light);padding:64px 0;"><div class="section" style="padding-top:0;padding-bottom:0;"><h2 class="section-title">${esc(L.problem_title||'Sound Familiar?')}</h2><div class="problems-grid">${prH}</div></div></div>`:''} ${hwH?`<div class="section"><h2 class="section-title">How It Works</h2><div class="steps">${hwH}</div></div>`:''}${ftH?`<div style="background:var(--gray-light);padding:64px 0;"><div class="section" style="padding-top:0;padding-bottom:0;"><h2 class="section-title">${esc(L.features_title||'Features')}</h2><div class="features-grid">${ftH}</div></div></div>`:''}${plH?`<div class="section"><h2 class="section-title">Simple, Transparent Pricing</h2><div class="plans-grid">${plH}</div></div>`:''}${fqH?`<div class="section"><h2 class="section-title">FAQ</h2><div class="faq-list">${fqH}</div></div>`:''}  <div class="cta-section"><h2>${esc(L.cta_title||'Get Started Today')}</h2><p>${esc(L.cta_desc||'')}</p><a href="${esc(P.stripe_starter_url||'#')}">${esc(L.cta_primary||'Get Early Access')}</a>${tH?`<div class="cta-trust">${tH}</div>`:''}</div>`;}
function renderDemo(){const T=P.tool||{};const out=T.demo_output||{};const mH=(out.metrics||[]).map(m=>`<div class="metric-card"><div class="metric-value">${esc(m.value)}</div><div class="metric-label">${esc(m.label)}</div><div class="metric-trend">${esc(m.trend||'')}</div></div>`).join('');const tbl=out.table||{};const hdrs=(tbl.headers||[]).map(h=>`<th>${esc(h)}</th>`).join('');const rows=(tbl.rows||[]).map(r=>`<tr>${r.map(c=>{if(c&&typeof c==='object'&&c.badge)return`<td><span class="badge ${c.color||'green'}">${esc(c.text)}</span></td>`;return`<td>${esc(c)}</td>`}).join('')}</tr>`).join('');const fi=out.findings||{};const fiH=(fi.items||[]).map(f=>`<div class="finding-item"><div class="finding-dot ${esc(f.severity)}"></div><div><div class="finding-title">${esc(f.title)}</div><div class="finding-detail">${esc(f.detail||'')}</div>${f.action?`<div class="finding-action">→ ${esc(f.action)}</div>`:''}</div></div>`).join('');const inH=(T.inputs||[]).map(i=>`<div class="demo-input-group"><label>${esc(i.label)}</label><input type="${esc(i.type||'text')}" id="demo_${esc(i.id)}" placeholder="${esc(i.placeholder||'')}" value="${esc(i.demo||i.default||'')}"></div>`).join('');document.getElementById('page-demo').innerHTML=`<div class="demo-page"><div class="demo-form-card"><h2>${esc(T.form_title||'See it in action')}</h2><p style="font-size:14px;color:var(--text-muted);margin-bottom:20px;">${esc(T.description||'')}</p><div class="demo-inputs">${inH}</div><button class="demo-btn" onclick="runDemo()">${esc(T.button_label||'⚡ Generate Report')}</button></div><div class="demo-results" id="demoResults"><div class="metrics-grid">${mH}</div>${tbl.headers?`<table class="result-table"><thead><tr>${hdrs}</tr></thead><tbody>${rows}</tbody></table>`:''}${fi.items?`<div class="findings"><div class="findings-header">${esc(fi.title||'AI Assessment')}</div>${fiH}</div>`:''}</div></div>`;}
function runDemo(){const r=document.getElementById('demoResults');if(r){r.classList.add('visible');r.scrollIntoView({behavior:'smooth',block:'start'});}}
function renderSales(){const S=P.sales;if(!S){document.getElementById('page-sales').innerHTML='<div class="empty-state"><p>No sales data.</p></div>';return;}const emails=[{label:'Cold Email #1',badge:'Day 1',text:S.cold_email_1},{label:'Follow-up',badge:'Day 3',text:S.followup_day3},{label:'Follow-up',badge:'Day 7',text:S.followup_day7},{label:'Break-up Email',badge:'Final',text:S.breakup}].filter(e=>e.text);const eH=emails.map(e=>`<div class="email-card"><div class="email-card-header"><span class="email-card-label">${esc(e.label)}</span><span class="email-badge">${esc(e.badge)}</span></div><div class="email-body">${esc(e.text)}</div><button class="copy-btn" onclick="copyText(${JSON.stringify(e.text)},this)">📋 Copy</button></div>`).join('');const lH=S.linkedin?`<div class="linkedin-card"><h3>💼 LinkedIn</h3><div class="linkedin-body">${esc(S.linkedin)}</div><button class="copy-btn" onclick="copyText(${JSON.stringify(S.linkedin)},this)" style="margin:12px 0 0;">📋 Copy</button></div>`:'';const oH=(S.objections||[]).map(o=>`<div class="objection-card"><div class="objection-q">${esc(o.objection||o.q||'')}</div><div class="objection-a">${esc(o.response||o.a||'')}</div></div>`).join('');document.getElementById('page-sales').innerHTML=`<div class="sales-page"><h1>Sales Pack</h1><p class="page-sub">Ready-to-send outbound emails and objection handlers for ${esc(P.name||'this product')}.</p>${eH}${lH}${oH?`<div class="objections-section"><h2>Objection Handlers</h2>${oH}</div>`:''}</div>`;}
function renderFulfillment(){const F=P.fulfillment;if(!F){document.getElementById('page-fulfillment').innerHTML='<div class="empty-state"><p>No fulfillment data.</p></div>';return;}const sH=(F.steps||[]).map((s,i)=>`<div class="onboard-step"><div class="onboard-num">${i+1}</div><div class="onboard-text">${esc(s)}</div></div>`).join('');const gH=(F.customer_gets||[]).map(g=>`<div class="gets-item">${esc(g)}</div>`).join('');document.getElementById('page-fulfillment').innerHTML=`<div class="fulfillment-page"><h1>Fulfillment</h1><p class="page-sub">From signup to first value.</p>${sH?`<div class="onboarding-steps"><h2>⚡ Onboarding Steps</h2>${sH}</div>`:''}${F.first_value_timing?`<div class="first-value-box" style="margin-bottom:32px;"><div class="first-value-icon">🚀</div><div><div class="first-value-label">First Value Timing</div><div class="first-value-text">${esc(F.first_value_timing)}</div></div></div>`:''}${F.ai_role?`<div class="ai-role-section"><h2>🤖 AI Role</h2><div class="ai-role-body">${esc(F.ai_role)}</div></div>`:''}${gH?`<div class="customer-gets-section"><h2>📦 What the Customer Gets</h2><div class="gets-grid">${gH}</div></div>`:''}</div>`;}
function renderReadiness(){const R=P.readiness;if(!R){document.getElementById('page-readiness').innerHTML='<div class="empty-state"><p>No readiness data.</p></div>';return;}const score=R.total_score||0;const rec=R.recommendation||'human_review';const rl={approve:'✅ Approved',human_review:'👀 Human Review',reject:'❌ Rejected'};const dims=[['icp_clarity','ICP Clarity',10],['pain_severity','Pain Severity',10],['offer_strength','Offer Strength',10],['mrr_logic','MRR Logic',10],['fulfillment_readiness','Fulfillment Readiness',8],['product_readiness','Product Readiness',8],['market_clarity','Market Clarity',7],['sales_readiness','Sales Readiness',7],['payment_readiness','Payment Readiness',6],['support_readiness','Support Readiness',5],['legal_readiness','Legal Readiness',5],['retention_potential','Retention Potential',5],['scale_potential','Scale Potential',5],['risk_safety_score','Risk Safety Score',4]];const dH=dims.map(([k,l,m])=>{const v=typeof R[k]==='number'?R[k]:0;const p=Math.round((v/m)*100);const c=p>=75?'high':p>=50?'mid':'low';return`<div class="dim-row"><div class="dim-name">${esc(l)}</div><div class="dim-bar-wrap"><div class="dim-bar ${c}" style="width:${p}%"></div></div><div class="dim-score">${v}/${m}</div></div>`;}).join('');document.getElementById('page-readiness').innerHTML=`<div class="readiness-page"><h1>Readiness Score</h1><p class="page-sub">AI-powered assessment across 14 dimensions.</p><div class="score-hero"><div class="score-number">${score}</div><div class="score-label">out of 100</div><div class="score-badge ${rec}">${rl[rec]||rec}</div>${R.summary?`<div class="score-summary">${esc(R.summary)}</div>`:''}</div><div class="dims-grid">${dH}</div></div>`;}
renderLanding();renderDemo();renderSales();renderFulfillment();renderReadiness();
