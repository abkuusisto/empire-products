<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Qsisto · Founder Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07091A;color:#E8EEFF;font-family:Inter,system-ui,sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
.grid-2{display:grid;grid-template-columns:2fr 1fr;gap:1.25rem}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.card{background:#0F1526;border:1px solid rgba(80,105,170,.2);border-radius:14px;padding:1.375rem}
.label{font-size:.68rem;color:#7585AA;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.35rem}
.val-lg{font-size:2rem;font-weight:700}
.val-md{font-size:.9rem;color:#E8EEFF}
.muted{color:#7585AA}
.tiny{font-size:.7rem;color:#374567}
.badge{display:inline-block;font-size:.65rem;border-radius:4px;padding:.12rem .45rem;border:1px solid}
.badge-green{color:#22C55E;border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.08)}
.badge-red{color:#EF4444;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.08)}
.badge-yellow{color:#F59E0B;border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.08)}
.badge-blue{color:#3B82F6;border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.08)}
.badge-gray{color:#7585AA;border-color:rgba(80,105,170,.3);background:rgba(80,105,170,.08)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-green{background:#22C55E}
.dot-red{background:#EF4444}
.dot-yellow{background:#F59E0B}
.dot-gray{background:#374567}
.sep{border:none;border-top:1px solid rgba(80,105,170,.15);margin:1rem 0}
.btn-sm{background:transparent;border:1px solid rgba(80,105,170,.25);border-radius:8px;padding:.35rem .85rem;color:#7585AA;font-size:.75rem;cursor:pointer;font-family:inherit}
.btn-sm:hover{border-color:rgba(80,105,170,.5);color:#E8EEFF}
.input{width:100%;background:#0B0E1F;border:1px solid rgba(80,105,170,.2);border-radius:8px;padding:.65rem .9rem;font-size:.9rem;color:#E8EEFF;outline:none;font-family:inherit;box-sizing:border-box}
.btn-primary{width:100%;padding:.7rem;border:none;border-radius:8px;background:#3B82F6;color:#fff;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit}
.btn-primary:hover{background:#2563EB}
.btn-primary:disabled{background:#1E3A5F;cursor:not-allowed}
.quick-link{display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;background:rgba(80,105,170,.06);border:1px solid rgba(80,105,170,.12);border-radius:8px;color:#E8EEFF;font-size:.8rem;transition:border-color .15s}
.quick-link:hover{border-color:rgba(80,105,170,.3)}
.missing{display:flex;align-items:center;gap:.5rem;font-size:.78rem;margin-bottom:.35rem}
.event-row{padding:.625rem;background:rgba(80,105,170,.05);border:1px solid rgba(80,105,170,.1);border-radius:8px;margin-bottom:.5rem}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.grid-4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"><div style="text-align:center;padding:4rem;color:#7585AA">Initialising...</div></div>
<script>
const SUPABASE_URL='https://jmhzzzefiyvplwxvuuxo.supabase.co'
const ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptaHp6emVmaXl2cGx3eHZ1dXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTA2NjMsImV4cCI6MjA5ODEyNjY2M30.fhq7OJXOgGp2YWfs3uW_WrZU9I-6_d7uHUcEMTdS_Kc'
const sb=supabase.createClient(SUPABASE_URL,ANON_KEY)
const root=document.getElementById('root')

function fmt(d){if(!d)return'—';const dt=new Date(d);return dt.toLocaleDateString('en-GB')+' '+dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
function scoreColor(s){return s>=80?'#22C55E':s>=60?'#F59E0B':'#EF4444'}
function scoreClass(s){return s>=80?'badge-green':s>=60?'badge-yellow':'badge-red'}

async function init(){
  if(window.location.hash.includes('access_token')){
    await sb.auth.getSession()
    history.replaceState(null,'',window.location.pathname)
  }
  const {data:{session}}=await sb.auth.getSession()
  if(!session){renderLogin();return}
  sb.auth.onAuthStateChange((ev,sess)=>{
    if(ev==='SIGNED_IN')renderDashboard()
    if(ev==='SIGNED_OUT')renderLogin()
  })
  renderDashboard()
}

function renderLogin(){
  root.innerHTML=`
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem">
  <div class="card" style="width:100%;max-width:360px">
    <div style="font-size:1.1rem;font-weight:700;color:#E8EEFF;margin-bottom:.25rem">Qsisto</div>
    <div class="muted" style="font-size:.78rem;margin-bottom:1.75rem">Founder Dashboard</div>
    <div id="ls">
      <div class="label" style="margin-bottom:.4rem">Email</div>
      <input id="em" class="input" type="email" placeholder="your@email.com" style="margin-bottom:1rem" onkeydown="if(event.key==='Enter')doLogin()">
      <div id="le" style="display:none;margin-bottom:.65rem;padding:.5rem .75rem;border-radius:6px;background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.22);font-size:.77rem;color:#EF4444"></div>
      <button class="btn-primary" onclick="doLogin()">Send login link</button>
    </div>
    <div id="ss" style="display:none;padding:.75rem;border-radius:8px;background:rgba(34,197,94,.09);border:1px solid rgba(34,197,94,.22);font-size:.82rem;color:#22C55E;text-align:center">✓ Check your email</div>
    <div class="tiny" style="text-align:center;margin-top:1.5rem">AB Empire Oy · Business ID 3499735-5</div>
  </div>
</div>`
}

async function doLogin(){
  const em=document.getElementById('em')?.value?.trim()
  if(!em)return
  const btn=document.querySelector('#ls .btn-primary')
  btn.disabled=true;btn.textContent='Sending...'
  const{error}=await sb.auth.signInWithOtp({email:em,options:{emailRedirectTo:window.location.href}})
  if(error){
    const el=document.getElementById('le')
    el.style.display='block';el.textContent=error.message
    btn.disabled=false;btn.textContent='Send login link'
  }else{
    document.getElementById('ls').style.display='none'
    document.getElementById('ss').style.display='block'
  }
}

async function logout(){await sb.auth.signOut();renderLogin()}

async function renderDashboard(){
  root.innerHTML='<div style="text-align:center;padding:4rem;color:#7585AA">Loading data...</div>'
  try{
    const[cR,sR,rR,eR]=await Promise.all([
      sb.from('customers').select('*').order('created_at',{ascending:false}),
      sb.from('subscriptions').select('*').order('created_at',{ascending:false}),
      sb.from('product_runs').select('*').order('created_at',{ascending:false}).limit(10),
      sb.from('usage_events').select('*').order('created_at',{ascending:false}).limit(50)
    ])
    if(cR.error)throw cR.error
    const customers=cR.data||[]
    const subs=sR.data||[]
    const runs=rR.data||[]
    const events=eR.data||[]
    const activeSubs=subs.filter(s=>s.status==='active'||s.status==='trialing')
    const mrr=activeSubs.reduce((a,s)=>a+(parseFloat(s.price_eur)||0),0)
    const latestC=customers[0]
    const latestS=activeSubs[0]
    const latestR=runs[0]
    const fulfillEvents=events.filter(e=>
      e.event_source==='storeguard_scan_v1'||
      e.event_source==='stripe_webhook_runtime'||
      ['first_value_delivered','payment_processed','storeguard_scan_completed'].includes(e.event_type)
    ).slice(0,8)

    root.innerHTML=`
<nav style="display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem;background:rgba(7,9,26,.95);border-bottom:1px solid rgba(80,105,170,.15);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)">
  <div style="display:flex;align-items:center;gap:.6rem">
    <span style="font-size:.95rem;font-weight:700">Qsisto</span>
    <span class="badge badge-red">INTERNAL</span>
  </div>
  <div style="display:flex;align-items:center;gap:.75rem">
    <span class="tiny">${latestC?latestC.email:''}</span>
    <button class="btn-sm" onclick="logout()">Sign out</button>
  </div>
</nav>

<div style="max-width:1200px;margin:0 auto;padding:1.5rem">

  <div class="grid-4" style="margin-bottom:1.25rem">
    <div class="card">
      <div class="label">MRR</div>
      <div class="val-lg" style="color:${mrr>0?'#22C55E':'#7585AA'}">€${mrr>0?mrr.toFixed(0):'0'}</div>
      <div class="tiny" style="margin-top:.3rem">${mrr>0?activeSubs.length+' active plan'+(activeSubs.length>1?'s':''):'No active plans'}</div>
    </div>
    <div class="card">
      <div class="label">Customers</div>
      <div class="val-lg">${customers.length}</div>
      <div class="tiny" style="margin-top:.3rem">${customers.length>0?'Latest: '+fmt(latestC?.created_at):'Waiting for first'}</div>
    </div>
    <div class="card">
      <div class="label">Scans run</div>
      <div class="val-lg">${runs.length}</div>
      <div class="tiny" style="margin-top:.3rem">${latestR?'Last: '+fmt(latestR.created_at):'—'}</div>
    </div>
    <div class="card">
      <div class="label">5M target</div>
      <div class="val-lg" style="font-size:1.4rem;color:#7585AA">€5M</div>
      <div class="tiny" style="margin-top:.3rem">${mrr>0?Math.round(5000000/mrr).toLocaleString()+' more customers':'~102,041 more'}</div>
    </div>
  </div>

  <div class="grid-2">
    <div style="display:flex;flex-direction:column;gap:1.25rem">

      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
          <span style="font-weight:700">StoreGuard · Runtime</span>
          <span class="badge ${runs.length>0?'badge-green':'badge-gray'}">${runs.length>0?'LIVE':'AWAITING'}</span>
        </div>

        ${latestC?`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
          <div>
            <div class="label">Customer</div>
            <div class="val-md">${latestC.email||'—'}</div>
            <div class="tiny">${fmt(latestC.created_at)}</div>
          </div>
          <div>
            <div class="label">Plan</div>
            <div class="val-md">${latestS?(latestS.plan_key||'starter')+' · €'+(latestS.price_eur||49)+'/mo':'—'}</div>
            <div class="tiny" style="color:${activeSubs.length>0?'#22C55E':'#7585AA'}">${activeSubs.length>0?'● Active':'○ No active plan'}</div>
          </div>
        </div>
        `:`<div class="muted" style="font-size:.85rem;margin-bottom:1rem">No customers yet — waiting for first payment</div>`}

        <hr class="sep">

        ${latestR?`
        <div class="label" style="margin-bottom:.75rem">Latest scan</div>
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:.75rem">
          <div style="font-size:2.5rem;font-weight:700;color:${scoreColor(latestR.score||0)}">${latestR.score||0}</div>
          <div>
            <span class="badge ${scoreClass(latestR.score||0)}">${latestR.score>=80?'GREEN':latestR.score>=60?'YELLOW':'RED'}</span>
            <div class="val-md" style="margin-top:.25rem">${latestR.store_url||'—'}</div>
            <div class="tiny">${fmt(latestR.created_at)}</div>
          </div>
        </div>
        ${latestR.email_sent?
          `<div style="font-size:.78rem;color:#22C55E">✓ Report emailed to ${latestR.email_address||'customer'}</div>`:
          `<div style="font-size:.78rem;color:#F59E0B">⚠ Email delivery unconfirmed</div>`
        }
        `:`<div class="muted" style="font-size:.85rem">No scans yet</div>`}

        <hr class="sep">
        <div class="label" style="margin-bottom:.75rem">Missing before scale</div>
        <div class="missing"><span style="color:#EF4444">✗</span><span>Weekly recurring scan (cron job)</span></div>
        <div class="missing"><span style="color:#EF4444">✗</span><span>Customer dashboard at app.qsisto.com/dashboard</span></div>
        <div class="missing"><span style="color:#EF4444">✗</span><span>Cancel / refund flow for paying customer</span></div>
        <div class="missing"><span style="color:#F59E0B">⚠</span><span>Outreach — 7 prospects ready</span><span class="badge badge-gray" style="margin-left:.25rem">LOCKED</span></div>
      </div>

      <div class="card">
        <div style="font-weight:700;margin-bottom:1.25rem">Recent Fulfillment Events</div>
        ${fulfillEvents.length>0?
          fulfillEvents.map(e=>{
            const d=e.event_data||{}
            const score=d.score!=null?' · '+d.score+'/100':''
            const url=d.store_url||d.url||''
            const type=(e.event_type||'').replace(/_/g,' ')
            return`<div class="event-row">
              <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.2rem">
                <span class="dot dot-green"></span>
                <span style="font-size:.8rem">${type}${score}</span>
              </div>
              ${url?`<div class="tiny" style="padding-left:1.1rem">${url}</div>`:''}
              <div class="tiny" style="padding-left:1.1rem">${fmt(e.created_at)} · ${e.event_source||''}</div>
            </div>`
          }).join(''):
          '<div class="muted" style="font-size:.85rem">No fulfillment events yet</div>'
        }
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:1.25rem">

      <div class="card">
        <div style="font-weight:700;margin-bottom:1.25rem">System Status</div>
        <div style="display:flex;flex-direction:column;gap:.8rem">
          ${st('Stripe webhook','green','qsisto-saas-runtime/api/webhook')}
          ${st('Vercel runtime','green','app.qsisto.com')}
          ${st('StoreGuard scanner','green','Edge Function')}
          ${st('n8n fulfillment','green','Izmb4qDAPnXLpiF6')}
          ${st('Founder dashboard','green','This page')}
          ${st('Weekly cron','red','Not built yet')}
          ${st('Outreach','yellow','Locked — approval required')}
          ${st('Customer dashboard','red','app.qsisto.com/dashboard not built')}
        </div>
      </div>

      <div class="card">
        <div style="font-weight:700;margin-bottom:1.25rem">Quick Links</div>
        <div style="display:flex;flex-direction:column;gap:.45rem">
          ${ql('StoreGuard','https://qsisto.com/storeguard')}
          ${ql('Customer app','https://app.qsisto.com/login')}
          ${ql('Stripe','https://dashboard.stripe.com')}
          ${ql('Supabase','https://supabase.com/dashboard/project/jmhzzzefiyvplwxvuuxo')}
          ${ql('n8n','https://qsisto.app.n8n.cloud')}
          ${ql('Vercel','https://vercel.com/qsisto/qsisto-saas-runtime')}
        </div>
      </div>

      <div style="background:linear-gradient(135deg,rgba(59,130,246,.1),rgba(99,102,241,.1));border:1px solid rgba(59,130,246,.2);border-radius:14px;padding:1.375rem">
        <div class="label">MRR progress</div>
        <div style="font-size:1.75rem;font-weight:700;color:#E8EEFF;margin-bottom:.75rem">€${mrr>0?mrr.toFixed(0):'0'} <span class="muted" style="font-size:.85rem">/ €5,000,000</span></div>
        <div style="height:6px;background:rgba(80,105,170,.2);border-radius:3px;overflow:hidden;margin-bottom:.75rem">
          <div style="height:100%;background:linear-gradient(90deg,#3B82F6,#6366F1);border-radius:3px;width:${Math.min(mrr/50000,100).toFixed(4)}%"></div>
        </div>
        <div class="tiny">Next milestone: €1,000 MRR (~21 customers)</div>
      </div>

    </div>
  </div>

</div>
<div style="text-align:center;padding:2rem;font-size:.7rem;color:#374567;border-top:1px solid rgba(80,105,170,.1);margin-top:1rem">
  Internal staging · noindex · AB Empire Oy · Business ID 3499735-5
</div>`

  }catch(err){
    const msg=err?.message||err?.hint||JSON.stringify(err)
    root.innerHTML=`
<nav style="display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem;background:rgba(7,9,26,.95);border-bottom:1px solid rgba(80,105,170,.15)">
  <span style="font-weight:700">Qsisto</span>
  <button class="btn-sm" onclick="logout()">Sign out</button>
</nav>
<div style="max-width:900px;margin:2rem auto;padding:1.5rem">
  <div style="background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.22);border-radius:12px;padding:1.25rem">
    <div style="font-weight:600;color:#EF4444;margin-bottom:.5rem">Data load error</div>
    <div style="font-size:.85rem;color:#E8EEFF;margin-bottom:.75rem">${msg}</div>
    <div style="font-size:.78rem;color:#7585AA">If this is a permissions error, run the SQL policies file in Supabase → SQL Editor.</div>
  </div>
</div>`
  }
}

function st(name,color,detail){
  const dot=`<span class="dot dot-${color}"></span>`
  return`<div style="display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:.5rem">${dot}<span style="font-size:.82rem">${name}</span></div>
    <span class="tiny">${detail}</span>
  </div>`
}

function ql(label,url){
  return`<a href="${url}" target="_blank" class="quick-link"><span>${label}</span><span class="muted">↗</span></a>`
}

init()
</script>
</body>
</html>
