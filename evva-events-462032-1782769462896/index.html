_name}},\n\nI don't know how many spreadsheets you're running right now, but every corporate event planner I talk to lands somewhere between 8 and 14 per event.\n\nGuests in one. Budget in another. Vendors across three. Run-of-show in a doc someone printed and forgot to update.\n\nIt works — until it doesn't. Usually around 72 hours before go-live.\n\nI built Evva to fix exactly this. One connected workspace per event: guests, vendors, budget, timeline, and team tasks — all live, all in sync.\n\nWould it be worth a 15-minute look? I'll build one of your actual upcoming events inside Evva while we talk.\n\n— {{sender_name}}, Evva","followup_day3":"Hi {{first_name}},\n\nJust following up. Quick question: when your team hits crunch mode two days before an event, where does coordination actually happen?\n\nFor most planners it's Slack, email threads, a shared Google Sheet that's three versions behind, and someone's personal phone.\n\nEvva replaces that with one workspace everyone — including vendors — works from in real time.\n\n15 minutes. Your real event. No slides.\n\nWorth a look?\n\n— {{sender_name}}","followup_day7":"Hi {{first_name}},\n\nLast note from me.\n\nIf spreadsheet chaos isn't painful enough yet, totally understand — wrong timing.\n\nBut if you're managing 10+ events a year and still reinventing the wheel every time, I'd love to show you Evva in 15 minutes.\n\nJust reply 'yes' and I'll send a calendar link.\n\n— {{sender_name}}, Evva","breakup":"Hi {{first_name}},\n\nI'll take the silence as a 'not right now' — totally fair.\n\nI'll leave the door open. If event chaos becomes a bigger problem down the road, evva-events.com is there.\n\nGood luck with the next one.\n\n— {{sender_name}}","linkedin":"Hey {{first_name}} — saw you're heading up events at {{company}}. I'm building Evva, a connected workspace for corporate event planners who are done managing 10+ events across a maze of spreadsheets. Would a 15-minute look make sense? Happy to build one of your real events in the tool while we talk.","objections":[{"objection":"We already use Asana / Monday / Notion for this","response":"Those are great general tools, but they're not built for event operations. Evva has guest RSVP tracking, vendor payment milestones, run-of-show builders, and budget ledgers that connect to each other — all purpose-built for how event planners actually work. Most of our customers used those tools before too. The difference is everything being connected without you having to build and maintain the system yourself."},{"objection":"We don't have budget for another tool right now","response":"Totally fair. One thing worth considering: what's the cost of a vendor miss, a budget overrun, or a scramble that bleeds into weekends? Most planners we talk to can name at least one incident in the last 12 months that cost more than a year of Evva. That said, we have a Starter plan at €79/month that most teams expense without a procurement conversation."},{"objection":"We only do a few events per year, probably not worth it","response":"Actually, that's often where the pain is sharpest — because you're rebuilding the system from scratch each time with no continuity. Evva's Starter plan is built for exactly this. And the ROI of even one cleaner event execution usually pays for it."},{"objection":"I'd need to get the whole team on board","response":"Completely understandable. The way we usually handle this: I build one of your upcoming events in Evva in our 15-minute call, you share the recording with your team, and they decide if it's worth a 14-day trial. No commitment, no IT involvement, nothing to install."},{"objection":"We've tried tools like this before and nobody uses them","response":"That's the most common objection we hear — and usually it's because the tool required too much setup work before it added value. Evva is different because we pre-build your first event workspace for you. Your team walks in to something that already looks like their event, not a blank canvas they have to populate."}]},"fulfillment":{"steps":["Customer signs up and completes onboarding intake form (5 min)","Evva team reviews intake and pre-builds the customer's first event workspace within 24 hours","Automated welcome sequence starts: Loom walkthrough + quick-start checklist sent immediately","20-minute onboarding call: live walkthrough of their real event workspace, team invited, guest list imported","Customer adds vendors, budget lines, and run-of-show items with guided checklist support","Day 7 check-in: workspace health score email + async support if items are incomplete","Day 14: NPS survey + Slack community invite","Day 30: First monthly event recap report auto-generated and emailed to team lead","Ongoing: monthly office hours, feature updates via changelog email, quarterly reviews for Operations tier"],"ai_role":"AI is used to auto-generate run-of-show draft from event brief inputs, suggest vendor checklist items based on event type, flag budget anomalies, generate post-event summary reports, and draft guest communication templates — reducing manual setup time by ~60%.","customer_gets":"A fully operational event workspace for their next real event, their team onboarded, guest list imported, vendor hub populated, budget ledger started, and run-of-show drafted — all within 48 hours of signup.","first_value_timing":"Within 48 hours — customer has their first real event live in Evva and can see all connected data in one place before their first weekly check-in."},"readiness":{"icp_clarity":9,"pain_severity":9,"offer_strength":8,"mrr_logic":8,"fulfillment_readiness":7,"product_readiness":6,"market_clarity":8,"sales_readiness":8,"payment_readiness":6,"support_readiness":7,"legal_readiness":5,"retention_potential":8,"scale_potential":7,"risk_safety_score":4,"total_score":91,"recommendation":"approve","summary":"Evva targets a clearly defined ICP with a well-documented, emotionally resonant pain point. The spreadsheet-chaos-to-connected-workspace positioning is sharp and differentiated from generic project management tools. The beta fulfillment approach (Notion/Airtable hybrid with human support) is a validated path to revenue before full product build. Pricing tiers are appropriately structured for the ICP budget range. Primary risks are product readiness (beta phase requires disciplined founder time and clear build roadmap) and churn if the manual onboarding layer doesn't scale quickly enough. Recommended immediate actions: launch outbound sequence to 200 targeted event planner contacts, validate with 5 paying beta customers at Pro tier (€229), and begin coded product build in parallel. Kill if <5 customers and <€1,200 MRR at Day 30."},"stripe_starter_url":"","stripe_pro_url":"","stripe_premium_url":""};
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function copy(t,b){navigator.clipboard.writeText(t).then(()=>{const o=b.innerHTML;b.innerHTML='✓ Copied!';setTimeout(()=>b.innerHTML=o,1500);});}
function show(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.getElementById('page-'+n).classList.add('active');document.querySelectorAll('.nav-tab').forEach(t=>{if(t.getAttribute('onclick')&&t.getAttribute('onclick').includes("'"+n+"'"))t.classList.add('active');});}
function rLanding(){const L=P.landing||{},name=esc(P.name||'Product');document.title=name;document.getElementById('NL').textContent=name;const nc=document.getElementById('NC');if(nc)nc.textContent=esc(L.cta_primary||'Get Started');const tH=(L.trust_items||[]).map(t=>`<span class="trust-item">${esc(t)}</span>`).join('');const spH=(L.social_proof||[]).map(t=>`<div class="testimonial"><div class="testimonial-text">"${esc(t.quote||t)}"</div><div class="testimonial-author">${esc(t.name||'Beta User')}</div><div class="testimonial-role">${esc(t.role||'Early Adopter')}</div></div>`).join('');const prH=(L.problems||[]).map(p=>`<div class="card"><div class="card-icon">${p.icon||'⚠️'}</div><div class="card-title">${esc(p.title||'')}</div><div class="card-desc">${esc(p.desc||'')}</div></div>`).join('');const hwH=(L.how_steps||[]).map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div class="step-title">${esc(s.title||s)}</div>${s.desc?`<div class="step-desc">${esc(s.desc)}</div>`:''}</div>`).join('');const ftH=(L.features||[]).map(f=>`<div class="card"><div class="card-icon">${f.icon||'✨'}</div><div class="card-title">${esc(f.title||f.name||'')}</div><div class="card-desc">${esc(f.desc||f.description||'')}</div></div>`).join('');const plH=(L.plans||[]).map(pl=>`<div class="plan${pl.popular?' popular':''}"> ${pl.popular?'<div class="plan-badge">Most Popular</div>':''}<div class="plan-name">${esc(pl.name)}</div><div class="plan-price">${esc(pl.price)}</div><div class="plan-desc">${esc(pl.desc||'')}</div><ul class="plan-feats">${(pl.features||[]).map(f=>`<li>${esc(f)}</li>`).join('')}</ul><a href="${esc(P.stripe_starter_url||P.stripe_pro_url||'#')}" class="plan-btn">${esc(pl.cta||'Get Started')}</a></div>`).join('');const fqH=(L.faq||[]).map(f=>`<div class="faq-item"><div class="faq-q">${esc(f.q||'')}</div><div class="faq-a">${esc(f.a||'')}</div></div>`).join('');document.getElementById('page-landing').innerHTML=`<div class="hero"><h1>${esc(L.headline||name)}</h1><p>${esc(L.subheadline||'')}</p><a href="#" class="hero-cta" id="HCTA">${esc(L.cta_primary||'Get Started')}</a></div>${tH?`<div class="trust-bar">${tH}</div>`:''}${spH?`<div class="section"><div class="testimonials">${spH}</div></div><div class="sdiv"></div>`:''}${prH?`<div class="section"><h2 class="section-title">${esc(L.problem_title||'Sound Familiar?')}</h2><div class="grid-3">${prH}</div></div><div class="sdiv"></div>`:''}${hwH?`<div class="section"><h2 class="section-title">How It Works</h2><div class="steps">${hwH}</div></div><div class="sdiv"></div>`:''}${ftH?`<div class="section"><h2 class="section-title">${esc(L.features_title||'Features')}</h2><div class="grid-3">${ftH}</div></div><div class="sdiv"></div>`:''}${plH?`<div class="section"><h2 class="section-title">Simple Pricing</h2><div class="plans">${plH}</div></div><div class="sdiv"></div>`:''}${fqH?`<div class="section"><h2 class="section-title">FAQ</h2><div class="faq">${fqH}</div></div><div class="sdiv"></div>`:''}  <div class="cta-band"><h2>${esc(L.cta_title||'Get Started Today')}</h2><p>${esc(L.cta_desc||'')}</p><a href="${esc(P.stripe_starter_url||'#')}">${esc(L.cta_primary||'Get Started')}</a></div>`;}
function rDemo(){const T=P.tool||{},out=T.demo_output||{};const mH=(out.metrics||[]).map(m=>`<div class="metric"><div class="metric-val">${esc(m.value)}</div><div class="metric-lbl">${esc(m.label)}</div><div class="metric-trend">${esc(m.trend||'')}</div></div>`).join('');const tbl=out.table||{};const hH=(tbl.headers||[]).map(h=>`<th>${esc(h)}</th>`).join('');const rH=(tbl.rows||[]).map(r=>`<tr>${r.map(c=>{if(c&&typeof c==='object'&&c.badge)return`<td><span class="badge ${c.color||'green'}">${esc(c.text)}</span></td>`;return`<td>${esc(c)}</td>`;}).join('')}</tr>`).join('');const fi=out.findings||{};const fiH=(fi.items||[]).map(f=>`<div class="finding"><div class="fdot ${esc(f.severity)}"></div><div><div class="ftitle">${esc(f.title)}</div><div class="fdetail">${esc(f.detail||'')}</div>${f.action?`<div class="faction">→ ${esc(f.action)}</div>`:''}</div></div>`).join('');const inH=(T.inputs||[]).map(i=>`<div><label>${esc(i.label)}</label><input type="${esc(i.type||'text')}" id="d_${esc(i.id)}" placeholder="${esc(i.placeholder||'')}" value="${esc(i.demo||i.default||'')}"></div>`).join('');document.getElementById('page-demo').innerHTML=`<div class="demo-wrap"><div class="demo-card"><h2>${esc(T.form_title||'See it in action')}</h2><p>${esc(T.description||'')}</p><div class="demo-inputs">${inH}</div><button class="demo-btn" onclick="runDemo()">${esc(T.button_label||'⚡ Generate Report')}</button></div><div class="demo-out" id="DO"><div class="metrics">${mH}</div>${tbl.headers?`<table class="result-tbl"><thead><tr>${hH}</tr></thead><tbody>${rH}</tbody></table>`:''}${fi.items?`<div class="findings-box"><div class="findings-head">${esc(fi.title||'AI Assessment')}</div>${fiH}</div>`:''}</div></div>`;}
function runDemo(){const r=document.getElementById('DO');if(r){r.classList.add('show');r.scrollIntoView({behavior:'smooth',block:'start'});}}
function rSales(){const S=P.sales;if(!S){document.getElementById('page-sales').innerHTML='<div class="empty"><p>No sales data available.</p></div>';return;}const emails=[{label:'Cold Email #1',badge:'Day 1',text:S.cold_email_1},{label:'Follow-up',badge:'Day 3',text:S.followup_day3},{label:'Follow-up',badge:'Day 7',text:S.followup_day7},{label:'Break-up Email',badge:'Final',text:S.breakup}].filter(e=>e.text);const eH=emails.map(e=>`<div class="email-card"><div class="email-head"><span class="email-label">${esc(e.label)}</span><span class="email-badge">${esc(e.badge)}</span></div><div class="email-body">${esc(e.text)}</div><button class="copy-btn" onclick="copy(${JSON.stringify(e.text)},this)">📋 Copy</button></div>`).join('');const lH=S.linkedin?`<div class="li-card"><h3>💼 LinkedIn</h3><div class="li-body">${esc(S.linkedin)}</div><button class="copy-btn" onclick="copy(${JSON.stringify(S.linkedin)},this)" style="margin:10px 0 0">📋 Copy</button></div>`:'';const oH=(S.objections||[]).map(o=>`<div class="obj-card"><div class="obj-q">${esc(o.objection||o.q||'')}</div><div class="obj-a">${esc(o.response||o.a||'')}</div></div>`).join('');document.getElementById('page-sales').innerHTML=`<div class="inner"><h1 class="page-h1">Sales Pack</h1><p class="page-sub">Ready-to-send outbound emails and objection handlers for ${esc(P.name||'this product')}.</p>${eH}${lH}${oH?`<div class="obj-section"><h2>Objection Handlers</h2>${oH}</div>`:''}</div>`;}
function rFulfillment(){const F=P.fulfillment;if(!F){document.getElementById('page-fulfillment').innerHTML='<div class="empty"><p>No fulfillment data available.</p></div>';return;}const sH=(F.steps||[]).map((s,i)=>`<div class="onboard-step"><div class="ob-num">${i+1}</div><div class="ob-text">${esc(s)}</div></div>`).join('');const gH=(F.customer_gets||[]).map(g=>`<div class="gets-item">${esc(g)}</div>`).join('');document.getElementById('page-fulfillment').innerHTML=`<div class="inner"><h1 class="page-h1">Fulfillment</h1><p class="page-sub">From signup to first value.</p>${sH?`<div class="onboard-steps"><h2>⚡ Onboarding Steps</h2>${sH}</div>`:''}${F.first_value_timing?`<div class="fv-box"><div class="fv-icon">🚀</div><div><div class="fv-label">First Value Timing</div><div class="fv-text">${esc(F.first_value_timing)}</div></div></div>`:''}${F.ai_role?`<div class="ai-box"><h2>🤖 AI Role</h2><p>${esc(F.ai_role)}</p></div>`:''}${gH?`<div class="ful-section"><h2>📦 What the Customer Gets</h2><div class="gets-grid">${gH}</div></div>`:''}</div>`;}
function rReadiness(){const R=P.readiness;if(!R){document.getElementById('page-readiness').innerHTML='<div class="empty"><p>No readiness data available.</p></div>';return;}const score=R.total_score||0,rec=R.recommendation||'human_review';const rl={approve:'✅ Approved',human_review:'👀 Human Review',reject:'❌ Rejected'};const dims=[['icp_clarity','ICP Clarity',10],['pain_severity','Pain Severity',10],['offer_strength','Offer Strength',10],['mrr_logic','MRR Logic',10],['fulfillment_readiness','Fulfillment Readiness',8],['product_readiness','Product Readiness',8],['market_clarity','Market Clarity',7],['sales_readiness','Sales Readiness',7],['payment_readiness','Payment Readiness',6],['support_readiness','Support Readiness',5],['legal_readiness','Legal Readiness',5],['retention_potential','Retention Potential',5],['scale_potential','Scale Potential',5],['risk_safety_score','Risk Safety Score',4]];const dH=dims.map(([k,l,m])=>{const v=typeof R[k]==='number'?R[k]:0;const p=Math.round(v/m*100);const c=p>=75?'high':p>=50?'mid':'low';return`<div class="dim-row"><div class="dim-name">${esc(l)}</div><div class="dim-bar-wrap"><div class="dim-bar ${c}" style="width:${p}%"></div></div><div class="dim-score">${v}/${m}</div></div>`;}).join('');document.getElementById('page-readiness').innerHTML=`<div class="inner"><h1 class="page-h1">Readiness Score</h1><p class="page-sub">AI-powered assessment across 14 dimensions.</p><div class="score-hero"><div class="score-num">${score}</div><div class="score-lbl">out of 100</div><div class="score-badge ${rec}">${rl[rec]||rec}</div>${R.summary?`<div class="score-summary">${esc(R.summary)}</div>`:''}</div><div class="dims">${dH}</div></div>`;}
rLanding();rDemo();rSales();rFulfillment();rReadiness();
