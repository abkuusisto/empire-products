<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Ad Spend Watchdog — Stop Burning Budget</title>
<style>
  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --card-hover: #1a2235;
    --border: #1f2937;
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.15);
    --text: #f9fafb;
    --text-secondary: #9ca3af;
    --success: #10b981;
    --warning: #f59e0b;
    --error: #ef4444;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;font-size:0.875rem;line-height:1.6;min-height:100vh;}

  /* NAV */
  .nav{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;}
  .nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:8px;height:60px;}
  .logo{font-size:1rem;font-weight:800;color:var(--accent);letter-spacing:-0.02em;white-space:nowrap;margin-right:16px;display:flex;align-items:center;gap:8px;}
  .logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
  .nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none;}
  .nav-tabs::-webkit-scrollbar{display:none;}
  .nav-tab{padding:8px 14px;border-radius:8px;cursor:pointer;font-size:0.78rem;font-weight:600;color:var(--text-secondary);border:none;background:none;white-space:nowrap;transition:all 0.2s ease;border-bottom:2px solid transparent;}
  .nav-tab:hover{color:var(--text);background:var(--accent-glow);}
  .nav-tab.active{color:var(--accent);border-bottom:2px solid var(--accent);background:var(--accent-glow);}
  .beta-badge{margin-left:auto;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:0.65rem;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;}

  /* TABS */
  .tab-content{display:none;max-width:1200px;margin:0 auto;padding:32px 24px;}
  .tab-content.active{display:block;}

  /* CARDS */
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all 0.2s ease;}
  .card:hover{background:var(--card-hover);border-color:rgba(99,102,241,0.3);}
  .card-sm{padding:16px;}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:10px;font-weight:700;font-size:0.875rem;cursor:pointer;border:none;transition:all 0.2s ease;text-decoration:none;}
  .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(99,102,241,0.4);}
  .btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent);}
  .btn-outline:hover{background:var(--accent-glow);}
  .btn-ghost{background:rgba(255,255,255,0.05);color:var(--text);border:1px solid var(--border);}
  .btn-ghost:hover{background:rgba(255,255,255,0.1);}
  .btn-glow{position:relative;animation:pulseGlow 2s infinite;}
  @keyframes pulseGlow{0%,100%{box-shadow:0 0 20px rgba(99,102,241,0.4),0 0 40px rgba(99,102,241,0.2);}50%{box-shadow:0 0 30px rgba(99,102,241,0.7),0 0 60px rgba(99,102,241,0.4);}}
  .btn-sm{padding:8px 16px;font-size:0.78rem;}
  .btn-danger{background:rgba(239,68,68,0.15);color:var(--error);border:1px solid rgba(239,68,68,0.3);}
  .btn-danger:hover{background:rgba(239,68,68,0.25);}
  .btn-success{background:rgba(16,185,129,0.15);color:var(--success);border:1px solid rgba(16,185,129,0.3);}
  .btn-success:hover{background:rgba(16,185,129,0.25);}
  .btn-warning{background:rgba(245,158,11,0.15);color:var(--warning);border:1px solid rgba(245,158,11,0.3);}

  /* INPUTS */
  input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:0.875rem;width:100%;transition:all 0.2s ease;outline:none;font-family:inherit;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
  select option{background:var(--card);}
  label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-secondary);display:block;margin-bottom:6px;}

  /* GRID */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}

  /* TYPOGRAPHY */
  .display{font-size:2.5rem;font-weight:800;letter-spacing:-0.03em;line-height:1.1;}
  .section-head{font-size:1.25rem;font-weight:700;}
  .label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-secondary);}
  .gradient-text{background:linear-gradient(135deg,#6366f1,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

  /* BADGES */
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;}
  .badge-success{background:rgba(16,185,129,0.15);color:var(--success);border:1px solid rgba(16,185,129,0.3);}
  .badge-warning{background:rgba(245,158,11,0.15);color:var(--warning);border:1px solid rgba(245,158,11,0.3);}
  .badge-error{background:rgba(239,68,68,0.15);color:var(--error);border:1px solid rgba(239,68,68,0.3);}
  .badge-accent{background:var(--accent-glow);color:var(--accent);border:1px solid rgba(99,102,241,0.3);}
  .badge-neutral{background:rgba(255,255,255,0.05);color:var(--text-secondary);border:1px solid var(--border);}

  /* ALERTS */
  .alert{padding:14px 18px;border-radius:12px;font-size:0.85rem;margin-bottom:12px;border:1px solid;}
  .alert-error{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:#fca5a5;}
  .alert-warning{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.3);color:#fcd34d;}
  .alert-success{background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.3);color:#6ee7b7;}
  .alert-info{background:var(--accent-glow);border-color:rgba(99,102,241,0.3);color:#a5b4fc;}

  /* DIVIDER */
  .divider{height:1px;background:var(--border);margin:24px 0;}

  /* SCORE RING */
  .score-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .score-ring{position:relative;width:120px;height:120px;}
  .score-ring svg{transform:rotate(-90deg);}
  .score-ring-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
  .score-ring-num{font-size:1.8rem;font-weight:800;color:var(--text);}
  .score-ring-sub{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-secondary);}

  /* PROGRESS BAR */
  .progress-wrap{margin-bottom:16px;}
  .progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .progress-bar-bg{height:8px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden;}
  .progress-bar-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1);}

  /* COPY BOX */
  .copy-box{position:relative;}
  .copy-box textarea{font-family:inherit;resize:none;height:140px;font-size:0.8rem;}
  .copy-btn{position:absolute;top:10px;right:10px;padding:5px 12px;font-size:0.7rem;font-weight:700;border-radius:6px;cursor:pointer;background:var(--accent-glow);color:var(--accent);border:1px solid rgba(99,102,241,0.3);transition:all 0.2s ease;}
  .copy-btn:hover{background:rgba(99,102,241,0.3);}

  /* FAQ */
  .faq-item{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:8px;}
  .faq-q{padding:16px 20px;cursor:pointer;font-weight:600;display:flex;justify-content:space-between;align-items:center;transition:background 0.2s ease;}
  .faq-q:hover{background:var(--card-hover);}
  .faq-a{max-height:0;overflow:hidden;transition:max-height 0.35s ease,padding 0.2s ease;}
  .faq-a-inner{padding:0 20px 16px;color:var(--text-secondary);font-size:0.875rem;}
  .faq-item.open .faq-a{max-height:200px;}
  .faq-arrow{transition:transform 0.3s ease;color:var(--accent);}
  .faq-item.open .faq-arrow{transform:rotate(180deg);}

  /* METRIC CARD */
  .metric-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:all 0.2s ease;}
  .metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;}
  .metric-card.good::before{background:var(--success);}
  .metric-card.warn::before{background:var(--warning);}
  .metric-card.bad::before{background:var(--error);}
  .metric-card:hover{background:var(--card-hover);}
  .metric-value{font-size:1.8rem;font-weight:800;letter-spacing:-0.02em;margin:6px 0;}
  .metric-delta{font-size:0.78rem;font-weight:600;display:flex;align-items:center;gap:4px;}
  .delta-up{color:var(--error);}
  .delta-down{color:var(--success);}
  .delta-neutral{color:var(--text-secondary);}

  /* TIMELINE */
  .timeline{position:relative;padding-left:32px;}
  .timeline::before{content:'';position:absolute;left:12px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--accent),transparent);}
  .timeline-item{position:relative;margin-bottom:28px;}
  .timeline-dot{position:absolute;left:-26px;top:4px;width:14px;height:14px;border-radius:50%;border:2px solid var(--accent);background:var(--bg);}
  .timeline-dot.done{background:var(--accent);}
  .timeline-time{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);margin-bottom:4px;}
  .timeline-title{font-weight:700;margin-bottom:4px;}
  .timeline-body{color:var(--text-secondary);font-size:0.85rem;}

  /* CHART BARS */
  .chart-bars{display:flex;align-items:flex-end;gap:6px;height:80px;}
  .chart-bar{flex:1;border-radius:4px 4px 0 0;min-width:6px;transition:height 0.8s ease,opacity 0.2s;}
  .chart-bar:hover{opacity:0.8;}

  /* WATCHDOG SCORE */
  .fatigue-score{display:flex;align-items:center;gap:8px;}
  .fatigue-dots{display:flex;gap:4px;}
  .fatigue-dot{width:12px;height:12px;border-radius:50%;}

  /* LOADING */
  .loading-overlay{text-align:center;padding:60px 20px;}
  .spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-steps{margin-top:24px;text-align:left;max-width:320px;margin-left:auto;margin-right:auto;}
  .loading-step{display:flex;align-items:center;gap:10px;padding:8px 0;color:var(--text-secondary);font-size:0.85rem;transition:color 0.3s ease;}
  .loading-step.active{color:var(--accent);}
  .loading-step.done{color:var(--success);}
  .step-icon{width:18px;text-align:center;}

  /* TABLE */
  .data-table{width:100%;border-collapse:collapse;}
  .data-table th{text-align:left;padding:10px 14px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-secondary);border-bottom:1px solid var(--border);}
  .data-table td{padding:12px 14px;border-bottom:1px solid rgba(31,41,55,0.5);font-size:0.85rem;vertical-align:middle;}
  .data-table tr:last-child td{border-bottom:none;}
  .data-table tr:hover td{background:rgba(255,255,255,0.02);}

  /* PRICING */
  .pricing-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;transition:all 0.2s ease;position:relative;}
  .pricing-card:hover{border-color:rgba(99,102,241,0.4);transform:translateY(-2px);}
  .pricing-card.featured{border-color:var(--accent);background:linear-gradient(to bottom,rgba(99,102,241,0.08),var(--card));}
  .pricing-card.featured::before{content:'MOST POPULAR';position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:0.65rem;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:0.08em;}
  .price-num{font-size:2.2rem;font-weight:800;letter-spacing:-0.03em;}
  .price-period{font-size:0.85rem;color:var(--text-secondary);}
  .feature-list{list-style:none;margin:20px 0;}
  .feature-list li{padding:6px 0;font-size:0.85rem;display:flex;align-items:flex-start;gap:8px;border-bottom:1px solid rgba(31,41,55,0.5);}
  .feature-list li:last-child{border-bottom:none;}
  .feature-list .check{color:var(--success);}
  .feature-list .cross{color:var(--text-secondary);}

  /* SECTION STYLES */
  .section-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);margin-bottom:12px;}
  .hero-section{padding:80px 24px;text-align:center;position:relative;overflow:hidden;}
  .hero-section::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,0.08) 0%,transparent 70%);pointer-events:none;}

  /* TESTIMONIAL */
  .testimonial-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all 0.2s ease;}
  .testimonial-card:hover{border-color:rgba(99,102,241,0.3);background:var(--card-hover);}
  .testimonial-text{font-size:0.9rem;line-height:1.7;color:var(--text-secondary);margin-bottom:16px;font-style:italic;}
  .testimonial-author{display:flex;align-items:center;gap:12px;}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9rem;}
  .author-name{font-weight:700;font-size:0.85rem;}
  .author-title{font-size:0.75rem;color:var(--text-secondary);}

  /* OBJECTION CARD */
  .objection-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .objection-q{background:rgba(245,158,11,0.08);border-bottom:1px solid rgba(245,158,11,0.2);padding:12px 16px;font-weight:700;font-size:0.85rem;color:var(--warning);}
  .objection-a{padding:14px 16px;font-size:0.85rem;color:var(--text-secondary);line-height:1.7;}

  /* EMAIL TEMPLATE CARD */
  .email-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px;}
  .email-header{background:rgba(99,102,241,0.08);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;}
  .email-type{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);}
  .email-subject{font-size:0.85rem;font-weight:600;color:var(--text-secondary);margin-top:4px;}
  .email-body{padding:0;}

  /* RESPONSIVE */
  @media(max-width:768px){
    .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
    .display{font-size:1.8rem;}
    .nav-inner{gap:4px;}
    .nav-tab{padding:6px 10px;font-size:0.72rem;}
  }

  /* READINESS */
  .readiness-banner{padding:20px 24px;border-radius:16px;text-align:center;margin-bottom:28px;}
  .readiness-approve{background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(16,185,129,0.05));border:1px solid rgba(16,185,129,0.4);}
  .readiness-fix{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(245,158,11,0.05));border:1px solid rgba(245,158,11,0.4);}
  .readiness-kill{background:linear-gradient(135deg,rgba(239,68,68,0.15),rgba(239,68,68,0.05));border:1px solid rgba(239,68,68,0.4);}

  /* FLOW DIAGRAM */
  .flow-step{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;flex:1;}
  .flow-icon{width:56px;height:56px;background:var(--accent-glow);border:1px solid rgba(99,102,241,0.3);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
  .flow-arrow{color:var(--text-secondary);font-size:1.2rem;padding:0 4px;align-self:center;margin-top:-16px;}
  .flow-wrap{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;justify-content:center;}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  /* MINI CHART */
  .sparkline{display:flex;align-items:flex-end;gap:3px;height:40px;}
  .spark-bar{width:8px;border-radius:2px 2px 0 0;background:var(--accent);opacity:0.7;}

  /* ALERT FEED ITEM */
  .alert-feed-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid rgba(31,41,55,0.6);}
  .alert-feed-item:last-child{border-bottom:none;}
  .alert-feed-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
  .alert-feed-icon.err{background:rgba(239,68,68,0.15);}
  .alert-feed-icon.warn{background:rgba(245,158,11,0.15);}
  .alert-feed-icon.ok{background:rgba(16,185,129,0.15);}
  .alert-feed-content{flex:1;}
  .alert-feed-title{font-weight:700;font-size:0.88rem;margin-bottom:3px;}
  .alert-feed-desc{color:var(--text-secondary);font-size:0.8rem;line-height:1.5;}
  .alert-feed-meta{font-size:0.7rem;color:var(--text-secondary);margin-top:4px;display:flex;gap:12px;}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <div class="logo">
      <div class="logo-icon">🐕</div>
      Watchdog
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('tool')">🔍 Product Tool</button>
      <button class="nav-tab" onclick="showTab('landing')">🚀 Landing Page</button>
      <button class="nav-tab" onclick="showTab('sales')">📧 Sales Pack</button>
      <button class="nav-tab" onclick="showTab('fulfillment')">⚙️ Fulfillment</button>
      <button class="nav-tab" onclick="showTab('readiness')">📊 Readiness Score</button>
    </div>
    <div class="beta-badge">BETA</div>
  </div>
</nav>

<!-- ============================================================ -->
<!-- TAB 1: PRODUCT TOOL -->
<!-- ============================================================ -->
<div id="tab-tool" class="tab-content active">
  <div style="max-width:900px;margin:0 auto;">

    <!-- Header -->
    <div style="margin-bottom:28px;">
      <div class="section-label">LinkedIn Ad Spend Watchdog</div>
      <h1 class="section-head" style="font-size:1.6rem;letter-spacing:-0.02em;">Campaign Audit Engine</h1>
      <p style="color:var(--text-secondary);margin-top:6px;max-width:560px;">Paste your campaign details below. Our AI will analyze performance, flag budget waste, and deliver prioritized fix recommendations — exactly what real clients receive every morning.</p>
    </div>

    <!-- Input Form -->
    <div id="tool-form" class="card" style="margin-bottom:20px;">
      <div class="grid-2" style="gap:20px;">
        <div>
          <label>Company / Account Name</label>
          <input type="text" id="input-company" placeholder="e.g. Acme SaaS Inc." />
        </div>
        <div>
          <label>Industry Vertical</label>
          <select id="input-industry">
            <option value="saas">B2B SaaS</option>
            <option value="ecom">eCommerce / D2C</option>
            <option value="services">Professional Services</option>
            <option value="leadgen">Lead Gen / Agency</option>
            <option value="fintech">FinTech</option>
          </select>
        </div>
        <div>
          <label>Monthly LinkedIn Ad Budget ($)</label>
          <input type="number" id="input-budget" placeholder="e.g. 12000" min="1000" />
        </div>
        <div>
          <label>Number of Active Campaigns</label>
          <input type="number" id="input-campaigns" placeholder="e.g. 4" min="1" max="50" />
        </div>
        <div>
          <label>Primary Campaign Objective</label>
          <select id="input-objective">
            <option value="leadgen">Lead Generation</option>
            <option value="awareness">Brand Awareness</option>
            <option value="conversion">Website Conversions</option>
            <option value="engagement">Engagement / Retargeting</option>
          </select>
        </div>
        <div>
          <label>Current Average CTR (%)</label>
          <input type="number" id="input-ctr" placeholder="e.g. 0.45" step="0.01" min="0" />
        </div>
        <div>
          <label>Current Average CPL ($)</label>
          <input type="number" id="input-cpl" placeholder="e.g. 185" min="0" />
        </div>
        <div>
          <label>Days Since Last Creative Refresh</label>
          <input type="number" id="input-days" placeholder="e.g. 18" min="0" />
        </div>
      </div>
      <div style="margin-top:20px;display:flex;gap:12px;align-items:center;">

    navTabs.forEach(function(tab) {
      tab.classList.remove('active');
    });

      content.classList.remove('active');
      content.style.display = 'none';
    });
