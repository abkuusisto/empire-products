<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uptime Revenue Monitor — Know What Downtime Costs You</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --border: #1f2937;
    --accent: #6366f1;
    --accent2: #818cf8;
    --text: #f9fafb;
    --muted: #9ca3af;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --radius: 14px;
    --radius-sm: 10px;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }

  /* NAV */
  nav { position: sticky; top: 0; z-index: 100; background: rgba(10,14,26,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 8px; height: 60px; }
  .nav-logo { font-size: 17px; font-weight: 800; color: var(--accent2); white-space: nowrap; margin-right: 16px; letter-spacing: -0.3px; }
  .nav-logo span { color: var(--green); }
  .nav-tabs { display: flex; gap: 4px; flex: 1; overflow-x: auto; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab { background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: 8px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .nav-tab:hover { background: var(--border); color: var(--text); }
  .nav-tab.active { background: rgba(99,102,241,0.15); color: var(--accent2); border: 1px solid rgba(99,102,241,0.3); }
  .beta-badge { background: linear-gradient(135deg, #6366f1, #818cf8); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; letter-spacing: 0.5px; }

  /* SECTIONS */
  .section { display: none; }
  .section.active { display: block; }

  /* SHARED COMPONENTS */
  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .card-glow { box-shadow: 0 0 24px rgba(99,102,241,0.15); }
  h1, h2, h3 { font-weight: 800; line-height: 1.2; }
  .gradient-text { background: linear-gradient(135deg, #818cf8, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; }
  .btn-primary { background: linear-gradient(135deg, #6366f1, #818cf8); color: #fff; box-shadow: 0 0 24px rgba(99,102,241,0.4); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(99,102,241,0.6); }
  .btn-outline { background: transparent; color: var(--accent2); border: 1px solid rgba(99,102,241,0.4); }
  .btn-outline:hover { background: rgba(99,102,241,0.1); border-color: var(--accent2); }
  .btn-sm { padding: 8px 16px; font-size: 13px; }
  .tag { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .tag-green { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
  .tag-yellow { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
  .tag-red { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .tag-blue { background: rgba(99,102,241,0.15); color: var(--accent2); border: 1px solid rgba(99,102,241,0.3); }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input, select { width: 100%; background: #0d1425; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; padding: 11px 14px; transition: border-color 0.2s; outline: none; }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
  select option { background: #111827; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .spacer { height: 40px; }
  .spacer-sm { height: 20px; }
  .text-center { text-align: center; }
  .text-muted { color: var(--muted); }
  .divider { height: 1px; background: var(--border); margin: 32px 0; }

  /* ===== TAB 1: TOOL ===== */
  #tab-tool { padding: 40px 0 60px; }
  .tool-header { text-align: center; margin-bottom: 36px; }
  .tool-header h1 { font-size: 32px; margin-bottom: 10px; }
  .tool-header p { color: var(--muted); font-size: 16px; max-width: 560px; margin: 0 auto; }
  .tool-form { max-width: 700px; margin: 0 auto 32px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group { margin-bottom: 0; }
  .generate-btn { width: 100%; padding: 15px; font-size: 16px; letter-spacing: 0.3px; margin-top: 8px; }
  .loading-state { display: none; align-items: center; gap: 12px; justify-content: center; }
  .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #output-section { display: none; max-width: 900px; margin: 0 auto; }
  .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: gap; }
  .metric-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; }
  .metric-card:first-child { border-color: rgba(16,185,129,0.4); box-shadow: 0 0 16px rgba(16,185,129,0.1); }
  .metric-card:nth-child(2) { border-color: rgba(99,102,241,0.4); box-shadow: 0 0 16px rgba(99,102,241,0.1); }
  .metric-card:nth-child(3) { border-color: rgba(245,158,11,0.4); box-shadow: 0 0 16px rgba(245,158,11,0.1); }
  .metric-card:nth-child(4) { border-color: rgba(239,68,68,0.4); box-shadow: 0 0 16px rgba(239,68,68,0.1); }
  .metric-value { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
  .metric-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .incident-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .incident-table th { text-align: left; padding: 10px 14px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); font-weight: 600; }
  .incident-table td { padding: 12px 14px; border-bottom: 1px solid rgba(31,41,55,0.5); }
  .incident-table tr:last-child td { border-bottom: none; }
  .incident-table tr:hover td { background: rgba(255,255,255,0.02); }
  .ai-findings { background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(129,140,248,0.04)); border: 1px solid rgba(99,102,241,0.25); border-radius: var(--radius); padding: 24px; margin-top: 20px; }
  .ai-findings h3 { font-size: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .ai-finding-item { display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start; }
  .ai-finding-item:last-child { margin-bottom: 0; }
  .finding-icon { font-size: 18px; margin-top: 1px; flex-shrink: 0; }
  .finding-text { font-size: 14px; line-height: 1.6; }
  .finding-text strong { color: var(--text); display: block; margin-bottom: 2px; font-size: 13px; }
  .alert-preview { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2); border-radius: 12px; padding: 20px; margin-top: 20px; }
  .alert-preview h4 { font-size: 13px; color: var(--red); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .alert-preview p { font-size: 14px; line-height: 1.7; color: #fecaca; }
  .speed-bar-wrap { margin-bottom: 12px; }
  .speed-bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .speed-bar-track { background: var(--border); border-radius: 99px; height: 8px; overflow: hidden; }
  .speed-bar-fill { height: 100%; border-radius: 99px; transition: width 1s ease; }

  /* ===== TAB 2: LANDING ===== */
  #tab-landing { padding: 0; }
  .hero { padding: 80px 24px 60px; text-align: center; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(99,102,241,0.12) 0%, transparent 70%); }
  .hero h1 { font-size: clamp(36px, 5vw, 58px); max-width: 800px; margin: 0 auto 20px; }
  .hero p { font-size: 18px; color: var(--muted); max-width: 580px; margin: 0 auto 32px; line-height: 1.7; }
  .hero-cta { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .hero-note { margin-top: 16px; font-size: 13px; color: var(--muted); }
  .hero-note span { color: var(--green); }
  .pain-section { padding: 60px 24px; }
  .section-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent2); margin-bottom: 12px; }
  .section-title { font-size: clamp(26px, 3vw, 36px); margin-bottom: 12px; }
  .section-sub { color: var(--muted); font-size: 16px; max-width: 560px; margin: 0 auto 40px; }
  .pain-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; transition: all 0.2s; }
  .pain-card:hover { border-color: rgba(99,102,241,0.4); transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .pain-icon { font-size: 36px; margin-bottom: 14px; }
  .pain-card h3 { font-size: 17px; margin-bottom: 8px; }
  .pain-card p { color: var(--muted); font-size: 14px; line-height: 1.7; }
  .how-it-works { padding: 60px 24px; background: rgba(17,24,39,0.4); }
  .step { display: flex; gap: 24px; align-items: flex-start; }
  .step-num { width: 44px; height: 44px; background: linear-gradient(135deg, #6366f1, #818cf8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; flex-shrink: 0; box-shadow: 0 0 20px rgba(99,102,241,0.4); }
  .step-content h3 { font-size: 17px; margin-bottom: 6px; }
  .step-content p { color: var(--muted); font-size: 14px; line-height: 1.7; }
  .steps-list { display: flex; flex-direction: column; gap: 28px; max-width: 680px; margin: 0 auto; }
  .features-section { padding: 60px 24px; }
  .feature-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; transition: all 0.2s; }
  .feature-card:hover { border-color: rgba(99,102,241,0.35); box-shadow: 0 0 24px rgba(99,102,241,0.1); }
  .feature-icon { font-size: 28px; margin-bottom: 12px; }
  .feature-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .feature-card p { color: var(--muted); font-size: 13px; line-height: 1.6; }
  .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .testimonials-section { padding: 60px 24px; background: rgba(17,24,39,0.4); }
  .testimonial-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; }
  .testimonial-card:hover { border-color: rgba(99,102,241,0.3); }
  .stars { color: #f59e0b; font-size: 16px; margin-bottom: 12px; }
  .testimonial-text { font-size: 14px; line-height: 1.7; margin-bottom: 16px; font-style: italic; color: #e5e7eb; }
  .testimonial-author { display: flex; align-items: center; gap: 12px; }
  .author-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #818cf8); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
  .author-info { font-size: 13px; }
  .author-info strong { display: block; font-size: 14px; }
  .author-info span { color: var(--muted); }
  .pricing-section { padding: 60px 24px; }
  .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .pricing-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; position: relative; transition: all 0.2s; }
  .pricing-card:hover { transform: translateY(-4px); }
  .pricing-card.featured { border-color: rgba(99,102,241,0.5); box-shadow: 0 0 32px rgba(99,102,241,0.2); }
  .popular-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #6366f1, #818cf8); color: #fff; font-size: 11px; font-weight: 700; padding: 4px 14px; border-radius: 20px; letter-spacing: 0.5px; white-space: nowrap; }
  .pricing-name { font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .pricing-price { font-size: 42px; font-weight: 800; margin-bottom: 4px; }
  .pricing-price span { font-size: 16px; font-weight: 400; color: var(--muted); }
  .pricing-desc { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
  .pricing-features { list-style: none; margin-bottom: 28px; display: flex; flex-direction: column; gap: 10px; }
  .pricing-features li { font-size: 13px; display: flex; gap: 8px; align-items: flex-start; }
  .pricing-features li::before { content: '✓'; color: var(--green); font-weight: 700; flex-shrink: 0; margin-top: 1px; }
  .faq-section { padding: 60px 24px; background: rgba(17,24,39,0.4); }
  .faq-list { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
  .faq-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .faq-question { padding: 18px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 15px; transition: background 0.2s; }
  .faq-question:hover { background: rgba(255,255,255,0.02); }
  .faq-arrow { font-size: 18px; color: var(--accent2); transition: transform 0.3s; }
  .faq-item.open .faq-arrow { transform: rotate(180deg); }
  .faq-answer { display: none; padding: 0 20px 18px; color: var(--muted); font-size: 14px; line-height: 1.7; }
  .faq-item.open .faq-answer { display: block; }
  .final-cta { padding: 80px 24px; text-align: center; background: radial-gradient(ellipse 70% 80% at 50% 50%, rgba(99,102,241,0.1) 0%, transparent 70%); }
  .final-cta h2 { font-size: clamp(28px, 4vw, 44px); margin-bottom: 16px; }
  .final-cta p { color: var(--muted); font-size: 16px; margin-bottom: 32px; }

  /* ===== TAB 3: SALES PACK ===== */
  #tab-sales { padding: 40px 0 60px; }
  .sales-header { margin-bottom: 32px; }
  .email-template { margin-bottom: 20px; }
  .template-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .template-label h3 { font-size: 14px; font-weight: 700; color: var(--accent2); }
  .template-box { background: #0d1425; border: 1px solid var(--border); border-radius: 12px; padding: 18px; font-size: 13px; line-height: 1.8; color: #d1d5db; white-space: pre-wrap; font-family: system-ui; max-height: 220px; overflow-y: auto; }
  .template-box::-webkit-scrollbar { width: 4px; }
  .template-box::-webkit-scrollbar-track { background: transparent; }
  .template-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .copy-btn { background: rgba(99,102,241,0.15); color: var(--accent2); border: 1px solid rgba(99,102,241,0.3); border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .copy-btn:hover { background: rgba(99,102,241,0.25); }
  .objection-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 12px; }
  .objection-card h4 { font-size: 14px; font-weight: 700; color: var(--yellow); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .objection-card p { font-size: 13px; color: #d1d5db; line-height: 1.7; }

  /* ===== TAB 4: FULFILLMENT ===== */
  #tab-fulfillment { padding: 40px 0 60px; }
  .fulfillment-step { display: flex; gap: 20px; margin-bottom: 24px; align-items: flex-start; }
  .fulfillment-num { width: 36px; height: 36px; background: linear-gradient(135deg, #6366f1, #818cf8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; flex-shrink: 0; box-shadow: 0 0 14px rgba(99,102,241,0.4); }
  .fulfillment-content { flex: 1; }
  .fulfillment-content h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .fulfillment-content p { font-size: 13px; color: var(--muted); line-height: 1.7; }
  .fulfillment-content .tag { margin-top: 6px; }
  .delivery-box { background: linear-gradient(135deg, rgba(16,185,129,0.08), rgba(16,185,129,0.03)); border: 1px solid rgba(16,185,129,0.25); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .delivery-box h3 { font-size: 14px; color: var(--green); font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .delivery-box ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .delivery-box ul li { font-size: 13px; color: #d1d5db; display: flex; gap: 8px; }
  .delivery-box ul li::before { content: '→'; color: var(--green); font-weight: 700; }
  .timeline-row { display: flex; gap: 16px; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(31,41,55,0.5); }
  .timeline-row:last-child { border-bottom: none; }
  .timeline-day { font-size: 12px; font-weight: 700; color: var(--accent2); width: 60px; flex-shrink: 0; }
  .timeline-text { font-size: 13px; color: #d1d5db; }

  /* ===== TAB 5: READINESS ===== */
  #tab-readiness { padding: 40px 0 60px; }
  .readiness-header { text-align: center; margin-bottom: 40px; }
  .score-ring-wrap { display: flex; justify-content: center; margin-bottom: 32px; }
  .score-ring { position: relative; width: 160px; height: 160px; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
  .score-number { font-size: 42px; font-weight: 800; color: var(--green); }
  .score-label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
  .verdict-banner { text-align: center; padding: 20px 40px; border-radius: 14px; margin-bottom: 36px; font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }
  .verdict-approve { background: rgba(16,185,129,0.12); border: 2px solid rgba(16,185,129,0.4); color: var(--green); }
  .dimension-bars { max-width: 700px; margin: 0 auto 40px; display: flex; flex-direction: column; gap: 14px; }
  .dim-bar { }
  .dim-bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .dim-bar-label span:first-child { font-weight: 600; }
  .dim-bar-label span:last-child { color: var(--muted); }
  .dim-bar-track { background: var(--border); border-radius: 99px; height: 10px; overflow: hidden; }
  .dim-bar-fill { height: 100%; border-radius: 99px; width: 0%; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); }
  .fixes-section { max-width: 700px; margin: 0 auto; }
  .fix-item { display: flex; gap: 12px; padding: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; align-items: flex-start; }
  .fix-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .fix-text { font-size: 13px; color: #d1d5db; line-height: 1.6; }
  .fix-text strong { color: var(--text); display: block; margin-bottom: 2px; }
<script>
document.addEventListener('DOMContentLoaded',function(){
  window.showTab=function(n){
    document.querySelectorAll('.section').forEach(s=>s.style.display='none');
    var el=document.getElementById('tab-'+n);
    if(el)el.style.display='block';
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    var at=document.querySelector('[onclick*="'+n+'"]');
    if(at)at.classList.add('active');
  };
  showTab('tool');
  document.querySelectorAll('.faq-item,.faq-q,[class*=faq]').forEach(f=>{
    f.style.cursor='pointer';
    f.addEventListener('click',function(){this.closest('[class*=faq]').classList.toggle('open');});
  });
  document.querySelectorAll('button').forEach(b=>{
    if(b.textContent.includes('Start')||b.textContent.includes('Trial')||b.textContent.includes('Get Started')){
      b.addEventListener('click',function(){alert('Redirecting to Stripe checkout...');});
    }
  });
});
</script></body>
</html>
