<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uptime Revenue Monitor — Know What Downtime Is Costing You</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05070f;
  --surface-1: #0a0d18;
  --surface-2: #0f1320;
  --border: #1a2035;
  --accent: #5b5fef;
  --accent-2: #7578f3;
  --text-1: #eef0f8;
  --text-2: #7a85a8;
  --green: #22c55e;
  --red: #f87171;
  --amber: #fbbf24;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* NAV */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  height: 48px;
  background: rgba(5,7,15,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-1);
  white-space: nowrap;
  text-decoration: none;
}

.logo-icon {
  width: 22px;
  height: 22px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

.nav-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 16px;
  flex-shrink: 0;
}

.nav-tabs {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
  height: 48px;
  padding: 0 14px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-2);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.2s, border-color 0.2s;
}
.nav-tab:hover { color: var(--text-1); }
.nav-tab.active { color: var(--text-1); border-bottom-color: var(--accent); }

.beta-pill {
  margin-left: auto;
  background: rgba(91,95,239,0.15);
  border: 1px solid rgba(91,95,239,0.35);
  color: var(--accent-2);
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.08em;
  flex-shrink: 0;
}

/* PAGES */
.page { display: none; }
.page.active { display: block; }

/* CONTAINER */
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.section { padding: 64px 0; }

/* BUTTONS */
.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 12px 24px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 1px 3px rgba(0,0,0,.5);
  transition: box-shadow 0.2s, transform 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-primary:hover {
  box-shadow: 0 4px 20px rgba(91,95,239,.35);
  transform: translateY(-1px);
}

.btn-ghost {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 24px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s, transform 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-ghost:hover { color: var(--text-1); border-color: var(--text-2); transform: translateY(-1px); }

.btn-sm {
  padding: 8px 16px;
  font-size: 13px;
  border-radius: 8px;
}

/* CARDS */
.card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
}

/* ===================== TAB 1: LIVE DEMO ===================== */
.demo-eyebrow {
  text-align: center;
  padding: 40px 0 32px;
}
.eyebrow-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(91,95,239,0.12);
  border: 1px solid rgba(91,95,239,0.25);
  color: var(--accent-2);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 16px;
  letter-spacing: 0.06em;
}
.demo-eyebrow h2 {
  font-size: 28px;
  font-weight: 800;
  color: var(--text-1);
  margin-bottom: 8px;
}
.demo-eyebrow p {
  color: var(--text-2);
  font-size: 15px;
  max-width: 520px;
  margin: 0 auto;
}

.alert-info {
  background: rgba(91,95,239,0.08);
  border: 1px solid rgba(91,95,239,0.25);
  border-radius: 10px;
  padding: 14px 18px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 28px;
  font-size: 13px;
  color: var(--accent-2);
  line-height: 1.5;
}
.alert-info span { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

.input-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.form-input {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text-1);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  transition: border-color 0.2s;
  outline: none;
}
.form-input:focus { border-color: var(--accent); }
.form-input option { background: var(--surface-2); }

.btn-row {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-top: 8px;
  flex-wrap: wrap;
}

.loading-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin: 20px 0;
  display: none;
}
.loading-bar.active { display: block; }
.loading-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  border-radius: 2px;
  animation: loadFill 1.8s ease-out forwards;
}
@keyframes loadFill { from { width: 0; } to { width: 100%; } }

.output-section { display: none; }
.output-section.visible { display: block; }

.metrics-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

.metric-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  text-align: center;
}
.metric-icon { font-size: 24px; margin-bottom: 8px; }
.metric-value {
  font-size: 28px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
}
.metric-label {
  font-size: 12px;
  color: var(--text-2);
  font-weight: 500;
}
.metric-delta {
  font-size: 11px;
  font-weight: 600;
  margin-top: 6px;
  padding: 2px 8px;
  border-radius: 20px;
  display: inline-block;
}
.delta-red { background: rgba(248,113,113,0.12); color: var(--red); }
.delta-green { background: rgba(34,197,94,0.12); color: var(--green); }
.delta-amber { background: rgba(251,191,36,0.12); color: var(--amber); }

.health-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
}
.health-green { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
.health-amber { background: rgba(251,191,36,0.12); color: var(--amber); border: 1px solid rgba(251,191,36,0.25); }
.health-red { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }

.table-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 24px;
}
.table-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.table-title { font-size: 14px; font-weight: 700; }
table { width: 100%; border-collapse: collapse; }
th {
  padding: 10px 20px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
td {
  padding: 12px 20px;
  font-size: 13px;
  border-bottom: 1px solid rgba(26,32,53,0.5);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

.pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.pill-red { background: rgba(248,113,113,0.12); color: var(--red); }
.pill-green { background: rgba(34,197,94,0.12); color: var(--green); }
.pill-amber { background: rgba(251,191,36,0.12); color: var(--amber); }

.findings-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.finding-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
}
.finding-type {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.finding-critical { color: var(--red); }
.finding-warning { color: var(--amber); }
.finding-good { color: var(--green); }
.finding-card h4 { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
.finding-card p { font-size: 13px; color: var(--text-2); line-height: 1.5; }

.output-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 8px;
}

/* ===================== TAB 2: LANDING PAGE ===================== */
.hero {
  position: relative;
  padding: 90px 0 80px;
  text-align: center;
  overflow: hidden;
}
.aurora {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 400px;
  background: radial-gradient(ellipse at 30% 50%, rgba(91,95,239,0.18) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 50%, rgba(117,120,243,0.12) 0%, transparent 60%);
  filter: blur(40px);
  pointer-events: none;
}
.hero-beta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(91,95,239,0.12);
  border: 1px solid rgba(91,95,239,0.3);
  color: var(--accent-2);
  font-size: 12px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 24px;
  letter-spacing: 0.06em;
}
.hero h1 {
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 20px;
  max-width: 760px;
  margin-left: auto;
  margin-right: auto;
}
.grad-text {
  background: linear-gradient(135deg, var(--text-1) 0%, var(--accent-2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub {
  font-size: 18px;
  color: var(--text-2);
  max-width: 580px;
  margin: 0 auto 36px;
  line-height: 1.6;
}
.hero-ctas {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 40px;
}
.trust-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
}
.trust-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-2);
}
.trust-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

/* SECTIONS */
.section-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(91,95,239,0.1);
  border: 1px solid rgba(91,95,239,0.2);
  color: var(--accent-2);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 16px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.section-title {
  font-size: clamp(24px, 3vw, 36px);
  font-weight: 800;
  margin-bottom: 12px;
}
.section-sub {
  color: var(--text-2);
  font-size: 16px;
  line-height: 1.6;
  max-width: 560px;
}
.text-center { text-align: center; }
.mx-auto { margin-left: auto; margin-right: auto; }

/* TESTIMONIALS */
.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 40px;
}
.testi-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
}
.stars { color: var(--amber); font-size: 14px; margin-bottom: 14px; }
.testi-text { font-size: 14px; color: var(--text-2); line-height: 1.6; margin-bottom: 16px; font-style: italic; }
.testi-author { display: flex; align-items: center; gap: 10px; }
.testi-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.testi-name { font-size: 13px; font-weight: 700; }
.testi-role { font-size: 11px; color: var(--text-2); }

/* PROBLEMS */
.problems-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 40px;
}
.problem-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
}
.problem-emoji { font-size: 28px; margin-bottom: 12px; }
.problem-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.problem-card p { font-size: 13px; color: var(--text-2); line-height: 1.6; }

/* STEPS */
.steps-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 40px;
}
.step-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px 24px;
  position: relative;
}
.step-number {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; color: #fff;
  margin-bottom: 16px;
}
.step-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.step-card p { font-size: 13px; color: var(--text-2); line-height: 1.6; }

/* FEATURES */
.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 40px;
}
.feature-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
}
.feature-icon {
  width: 44px; height: 44px; border-radius: 10px;
  background: rgba(91,95,239,0.12);
  border: 1px solid rgba(91,95,239,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 14px;
}
.feature-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.feature-card p { font-size: 13px; color: var(--text-2); line-height: 1.5; }

/* PRICING */
.pricing-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 40px;
  align-items: start;
}
.pricing-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
}
.pricing-card.featured {
  background: linear-gradient(145deg, rgba(91,95,239,0.08), rgba(15,19,32,1));
  border-color: rgba(91,95,239,0.4);
  position: relative;
}
.popular-badge {
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 14px;
  border-radius: 20px;
  white-space: nowrap;
  letter-spacing: 0.05em;
}
.plan-name { font-size: 14px; font-weight: 700; color: var(--text-2); margin-bottom: 8px; }
.plan-price { font-size: 36px; font-weight: 900; color: var(--text-1); line-height: 1; margin-bottom: 4px; }
.plan-price span { font-size: 16px; font-weight: 500; color: var(--text-2); }
.plan-desc { font-size: 13px; color: var(--text-2); margin-bottom: 20px; line-height: 1.5; }
.plan-features { list-style: none; margin-bottom: 24px; display: flex; flex-direction: column; gap: 10px; }
.plan-features li { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--text-2); line-height: 1.4; }
.plan-features li::before { content: '✓'; color: var(--green); font-weight: 700; flex-shrink: 0; margin-top: 1px; }

/* FAQ */
.faq-list { margin-top: 40px; display: flex; flex-direction: column; gap: 8px; max-width: 720px; margin-left: auto; margin-right: auto; }
.faq-item {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.faq-question {
  width: 100%;
  padding: 18px 20px;
  background: none;
  border: none;
  color: var(--text-1);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  text-align: left;
}
.faq-chevron {
  color: var(--text-2);
  font-size: 16px;
  transition: transform 0.3s;
  flex-shrink: 0;
}
.faq-item.open .faq-chevron { transform: rotate(180deg); }
.faq-answer {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}
.faq-item.open .faq-answer { max-height: 200px; }
.faq-answer p {
  padding: 0 20px 18px;
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.7;
}

/* FINAL CTA */
.final-cta {
  background: linear-gradient(145deg, rgba(91,95,239,0.1), rgba(15,19,32,0.8));
  border: 1px solid rgba(91,95,239,0.2);
  border-radius: 20px;
  padding: 60px 40px;
  text-align: center;
  margin: 0 0 64px;
}
.final-cta h2 { font-size: 32px; font-weight: 900; margin-bottom: 16px; }
.final-cta p { color: var(--text-2); font-size: 16px; margin-bottom: 32px; max-width: 480px; margin-left: auto; margin-right: auto; }

/* ===================== TAB 3: SALES PACK ===================== */
.sales-section { padding: 40px 0; }
.sales-header { margin-bottom: 32px; }
.emails-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 32px;
}
.email-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.email-header-bar {
  padding: 12px 16px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.email-type {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent-2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.copy-btn {
  background: rgba(91,95,239,0.12);
  border: 1px solid rgba(91,95,239,0.25);
  color: var(--accent-2);
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s;
}
