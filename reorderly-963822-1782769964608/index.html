 reorder inventory? Spreadsheet? Gut feel? Alerts from Seller Central?\n\nI ask because the #1 thing that tanks Amazon seller revenue isn't bad ads or bad reviews — it's stockouts. And most sellers don't catch them until it's already too late and the ranking has dropped.\n\nWe built Reorderly for exactly this: it connects to Amazon and Shopify, reads your real sales velocity, and gives you a reorder alert before you run out — not after.\n\nWould a 15-minute walkthrough be useful? Happy to show you what your current reorder risk looks like.\n\n— {{sender_name}}, Reorderly","followup_day3":"Hi {{first_name}},\n\nFollowing up on my note from a few days ago.\n\nIf you're curious — the average Amazon seller I talk to has at least 2–3 SKUs in the danger zone at any given time and doesn't know it. Usually because the spreadsheet is out of date or lead times changed.\n\nReorderly surfaces those risks automatically, every day.\n\n14-day free trial, no card required. Takes 30 minutes to set up.\n\nWant me to send you a link?\n\n— {{sender_name}}","followup_day7":"Hi {{first_name}},\n\nLast note — I promise.\n\nIf inventory forecasting is on your to-do list, Reorderly is the fastest way to check it off. Connects to Amazon + Shopify, shows you reorder risk in real time, replaces your reorder spreadsheet.\n\nFree trial: reorderly.io/trial\n\nIf now isn't the right time, no worries. Hope Q4 is a good one for {{brand_name}}.\n\n— {{sender_name}}","breakup":"Hi {{first_name}},\n\nRemoving you from my list — clearly not the right moment.\n\nIf stockouts or overstock become a headache down the road, reorderly.io is there when you need it.\n\nAll the best,\n{{sender_name}}","linkedin":"Hey {{first_name}} — saw you're running {{brand_name}} on Amazon. Quick question: are you forecasting reorders from data or still using spreadsheets/gut feel? We built Reorderly for sellers in exactly your position — connects to Amazon + Shopify and tells you when and how much to reorder before you stockout. Would love to show you a quick demo if it's relevant.","objections":[{"objection":"I already use a spreadsheet and it works fine","response":"Totally fair — spreadsheets work until you have a supplier delay, a seasonal spike, or just forget to update it. Reorderly runs automatically every day from your live data, so you're never working from stale numbers. Most users tell us they caught stockout risks in the first week they didn't know existed."},{"objection":"I'm too small — I only have 20 SKUs","response":"That's exactly who our Starter plan is for. At 20 SKUs, one stockout on your best seller can cost more than a year of Reorderly. Small catalogs are often the highest risk because you have less buffer."},{"objection":"Amazon Seller Central already shows me inventory health","response":"Amazon's inventory health is reactive — it tells you what already happened. Reorderly is predictive — it tells you what's about to happen based on your velocity and supplier lead times. Very different tools."},{"objection":"I use Inventory Lab / Skubana / Linnworks already","response":"Most of those tools are great at tracking what you have. Reorderly is focused on telling you when to act — reorder points, reorder quantities, and risk alerts. Many sellers use both. And if your current tool does this well, we'd love to know what's missing."},{"objection":"€129/month feels expensive","response":"One prevented stockout on a mid-performing ASIN typically saves more than €129 in lost revenue and ranking recovery costs. The tool pays for itself in the first month for most users. And the 14-day free trial means zero risk to find out."}]},"fulfillment":{"steps":["Customer signs up and pays via Stripe checkout","Automated welcome email sent with OAuth connection links for Amazon SP-API and Shopify","Customer completes integrations via guided in-app wizard (no technical knowledge required)","System initiates 90-day historical data sync — completion email sent when ready","Customer configures supplier lead times per SKU (pre-filled defaults provided)","First reorder risk dashboard populated and 'Your first report is ready' email sent","Daily digest emails and/or Slack alerts activated based on plan","Day 7 check-in email: 'How's your first week going? Here's how to read your forecast.'","Day 14 trial conversion prompt with summary of stockout risks caught during trial","(Scale plan only) Onboarding call booked within 48 hours of signup via Calendly"],"ai_role":"AI assists in: (1) demand forecasting model — calculating velocity trends, seasonality factors, and safety stock recommendations per SKU; (2) anomaly detection — flagging unusual sales spikes or drops that affect reorder calculations; (3) automated email digest generation — summarizing weekly reorder actions in plain language; (4) suggested reorder quantity optimization based on supplier MOQs and cash flow constraints entered by user","customer_gets":"A live inventory risk dashboard showing every SKU's reorder status (safe / reorder soon / urgent / overstocked), daily or weekly alert emails, Slack notifications, downloadable purchase order PDFs, sales velocity charts, and a supplier lead time tracker — all connected to their live Amazon and Shopify data.","first_value_timing":"Within 24 hours of signup — customer sees their first populated reorder risk dashboard and receives 'Your first reorder report is ready' email with a summary of at-risk SKUs."},"readiness":{"icp_clarity":9,"pain_severity":10,"offer_strength":9,"mrr_logic":9,"fulfillment_readiness":7,"product_readiness":7,"market_clarity":8,"sales_readiness":8,"payment_readiness":6,"support_readiness":5,"legal_readiness":4,"retention_potential":8,"scale_potential":8,"risk_safety_score":4,"total_score":94,"recommendation":"approve","summary":"Reorderly targets a high-pain, high-specificity ICP with a clear, measurable problem — stockouts and overstock in Amazon/Shopify sellers. The offer is tightly scoped, the integrations are well-defined via public APIs, and the value is demonstrable within 24 hours of signup. Pricing is competitive against tools like Skubana and SoStocked. Primary risk is build time for the Amazon SP-API integration and ensuring data sync reliability. Recommend a 30-day focused beta with 5–10 hand-onboarded sellers before opening self-serve. Kill criteria are conservative and appropriate for early validation. Scale path is strong: land Amazon sellers, expand to multi-channel (Walmart, Etsy, wholesale), and add ML forecasting as a moat."},"stripe_starter_url":"","stripe_pro_url":"","stripe_premium_url":""};
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function copy(t,b){navigator.clipboard.writeText(t).then(()=>{const o=b.innerHTML;b.innerHTML='✓ Copied!';setTimeout(()=>b.innerHTML=o,1500);});}
function show(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.getElementById('page-'+n).classList.add('active');document.querySelectorAll('.nav-tab').forEach(t=>{if(t.getAttribute('onclick')&&t.getAttribute('onclick').includes("'"+n+"'"))t.classList.add('active');});}
function rLanding(){const L=P.landing||{},name=esc(P.name||'Product');document.title=name;document.getElementById('NL').textContent=name;const nc=document.getElementById('NC');if(nc)nc.textContent=esc(L.cta_primary||'Get Started');const tH=(L.trust_items||[]).map(t=>`<span class="trust-item">${esc(t)}</span>`).join('');const spH=(L.social_proof||[]).map(t=>`<div class="testimonial"><div class="testimonial-text">"${esc(t.quote||t)}"</div><div class="testimonial-author">${esc(t.name||'Beta User')}</div><div class="testimonial-role">${esc(t.role||'Early Adopter')}</div></div>`).join('');const prH=(L.problems||[]).map(p=>`<div class="card"><div class="card-icon">${p.icon||'⚠️'}</div><div class="card-title">${esc(p.title||'')}</div><div class="card-desc">${esc(p.desc||'')}</div></div>`).join('');const hwH=(L.how_steps||[]).map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div class="step-title">${esc(s.title||s)}</div>${s.desc?`<div class="step-desc">${esc(s.desc)}</div>`:''}</div>`).join('');const ftH=(L.features||[]).map(f=>`<div class="card"><div class="card-icon">${f.icon||'✨'}</div><div class="card-title">${esc(f.title||f.name||'')}</div><div class="card-desc">${esc(f.desc||f.description||'')}</div></div>`).join('');const plH=(L.plans||[]).map(pl=>`<div class="plan${pl.popular?' popular':''}"> ${pl.popular?'<div class="plan-badge">Most Popular</div>':''}<div class="plan-name">${esc(pl.name)}</div><div class="plan-price">${esc(pl.price)}</div><div class="plan-desc">${esc(pl.desc||'')}</div><ul class="plan-feats">${(pl.features||[]).map(f=>`<li>${esc(f)}</li>`).join('')}</ul><a href="${esc(P.stripe_starter_url||P.stripe_pro_url||'#')}" class="plan-btn">${esc(pl.cta||'Get Started')}</a></div>`).join('');const fqH=(L.faq||[]).map(f=>`<div class="faq-item"><div class="faq-q">${esc(f.q||'')}</div><div class="faq-a">${esc(f.a||'')}</div></div>`).join('');document.getElementById('page-landing').innerHTML=`<div class="hero"><h1>${esc(L.headline||name)}</h1><p>${esc(L.subheadline||'')}</p><a href="#" class="hero-cta" id="HCTA">${esc(L.cta_primary||'Get Started')}</a></div>${tH?`<div class="trust-bar">${tH}</div>`:''}${spH?`<div class="section"><div class="testimonials">${spH}</div></div><div class="sdiv"></div>`:''}${prH?`<div class="section"><h2 class="section-title">${esc(L.problem_title||'Sound Familiar?')}</h2><div class="grid-3">${prH}</div></div><div class="sdiv"></div>`:''}${hwH?`<div class="section"><h2 class="section-title">How It Works</h2><div class="steps">${hwH}</div></div><div class="sdiv"></div>`:''}${ftH?`<div class="section"><h2 class="section-title">${esc(L.features_title||'Features')}</h2><div class="grid-3">${ftH}</div></div><div class="sdiv"></div>`:''}${plH?`<div class="section"><h2 class="section-title">Simple Pricing</h2><div class="plans">${plH}</div></div><div class="sdiv"></div>`:''}${fqH?`<div class="section"><h2 class="section-title">FAQ</h2><div class="faq">${fqH}</div></div><div class="sdiv"></div>`:''}  <div class="cta-band"><h2>${esc(L.cta_title||'Get Started Today')}</h2><p>${esc(L.cta_desc||'')}</p><a href="${esc(P.stripe_starter_url||'#')}">${esc(L.cta_primary||'Get Started')}</a></div>`;}
function rDemo(){const T=P.tool||{},out=T.demo_output||{};const mH=(out.metrics||[]).map(m=>`<div class="metric"><div class="metric-val">${esc(m.value)}</div><div class="metric-lbl">${esc(m.label)}</div><div class="metric-trend">${esc(m.trend||'')}</div></div>`).join('');const tbl=out.table||{};const hH=(tbl.headers||[]).map(h=>`<th>${esc(h)}</th>`).join('');const rH=(tbl.rows||[]).map(r=>`<tr>${r.map(c=>{if(c&&typeof c==='object'&&c.badge)return`<td><span class="badge ${c.color||'green'}">${esc(c.text)}</span></td>`;return`<td>${esc(c)}</td>`;}).join('')}</tr>`).join('');const fi=out.findings||{};const fiH=(fi.items||[]).map(f=>`<div class="finding"><div class="fdot ${esc(f.severity)}"></div><div><div class="ftitle">${esc(f.title)}</div><div class="fdetail">${esc(f.detail||'')}</div>${f.action?`<div class="faction">→ ${esc(f.action)}</div>`:''}</div></div>`).join('');const inH=(T.inputs||[]).map(i=>`<div><label>${esc(i.label)}</label><input type="${esc(i.type||'text')}" id="d_${esc(i.id)}" placeholder="${esc(i.placeholder||'')}" value="${esc(i.demo||i.default||'')}"></div>`).join('');document.getElementById('page-demo').innerHTML=`<div class="demo-wrap"><div class="demo-card"><h2>${esc(T.form_title||'See it in action')}</h2><p>${esc(T.description||'')}</p><div class="demo-inputs">${inH}</div><button class="demo-btn" onclick="runDemo()">${esc(T.button_label||'⚡ Generate Report')}</button></div><div class="demo-out" id="DO"><div class="metrics">${mH}</div>${tbl.headers?`<table class="result-tbl"><thead><tr>${hH}</tr></thead><tbody>${rH}</tbody></table>`:''}${fi.items?`<div class="findings-box"><div class="findings-head">${esc(fi.title||'AI Assessment')}</div>${fiH}</div>`:''}</div></div>`;}
function runDemo(){const r=document.getElementById('DO');if(r){r.classList.add('show');r.scrollIntoView({behavior:'smooth',block:'start'});}}
function rSales(){const S=P.sales;if(!S){document.getElementById('page-sales').innerHTML='<div class="empty"><p>No sales data available.</p></div>';return;}const emails=[{label:'Cold Email #1',badge:'Day 1',text:S.cold_email_1},{label:'Follow-up',badge:'Day 3',text:S.followup_day3},{label:'Follow-up',badge:'Day 7',text:S.followup_day7},{label:'Break-up Email',badge:'Final',text:S.breakup}].filter(e=>e.text);const eH=emails.map(e=>`<div class="email-card"><div class="email-head"><span class="email-label">${esc(e.label)}</span><span class="email-badge">${esc(e.badge)}</span></div><div class="email-body">${esc(e.text)}</div><button class="copy-btn" onclick="copy(${JSON.stringify(e.text)},this)">📋 Copy</button></div>`).join('');const lH=S.linkedin?`<div class="li-card"><h3>💼 LinkedIn</h3><div class="li-body">${esc(S.linkedin)}</div><button class="copy-btn" onclick="copy(${JSON.stringify(S.linkedin)},this)" style="margin:10px 0 0">📋 Copy</button></div>`:'';const oH=(S.objections||[]).map(o=>`<div class="obj-card"><div class="obj-q">${esc(o.objection||o.q||'')}</div><div class="obj-a">${esc(o.response||o.a||'')}</div></div>`).join('');document.getElementById('page-sales').innerHTML=`<div class="inner"><h1 class="page-h1">Sales Pack</h1><p class="page-sub">Ready-to-send outbound emails and objection handlers for ${esc(P.name||'this product')}.</p>${eH}${lH}${oH?`<div class="obj-section"><h2>Objection Handlers</h2>${oH}</div>`:''}</div>`;}
function rFulfillment(){const F=P.fulfillment;if(!F){document.getElementById('page-fulfillment').innerHTML='<div class="empty"><p>No fulfillment data available.</p></div>';return;}const sH=(F.steps||[]).map((s,i)=>`<div class="onboard-step"><div class="ob-num">${i+1}</div><div class="ob-text">${esc(s)}</div></div>`).join('');const _cg=F.customer_gets;const cgArr=Array.isArray(_cg)?_cg:(typeof _cg==='string'&&_cg?_cg.split('. ').filter(x=>x.trim()):Object.values(_cg||{}));const gH=cgArr.map(g=>`<div class="gets-item">${esc(g)}</div>`).join('');document.getElementById('page-fulfillment').innerHTML=`<div class="inner"><h1 class="page-h1">Fulfillment</h1><p class="page-sub">From signup to first value.</p>${sH?`<div class="onboard-steps"><h2>⚡ Onboarding Steps</h2>${sH}</div>`:''}${F.first_value_timing?`<div class="fv-box"><div class="fv-icon">🚀</div><div><div class="fv-label">First Value Timing</div><div class="fv-text">${esc(F.first_value_timing)}</div></div></div>`:''}${F.ai_role?`<div class="ai-box"><h2>🤖 AI Role</h2><p>${esc(F.ai_role)}</p></div>`:''}${gH?`<div class="ful-section"><h2>📦 What the Customer Gets</h2><div class="gets-grid">${gH}</div></div>`:''}</div>`;}
function rReadiness(){const R=P.readiness;if(!R){document.getElementById('page-readiness').innerHTML='<div class="empty"><p>No readiness data available.</p></div>';return;}const score=R.total_score||0,rec=R.recommendation||'human_review';const rl={approve:'✅ Approved',human_review:'👀 Human Review',reject:'❌ Rejected'};const dims=[['icp_clarity','ICP Clarity',10],['pain_severity','Pain Severity',10],['offer_strength','Offer Strength',10],['mrr_logic','MRR Logic',10],['fulfillment_readiness','Fulfillment Readiness',8],['product_readiness','Product Readiness',8],['market_clarity','Market Clarity',7],['sales_readiness','Sales Readiness',7],['payment_readiness','Payment Readiness',6],['support_readiness','Support Readiness',5],['legal_readiness','Legal Readiness',5],['retention_potential','Retention Potential',5],['scale_potential','Scale Potential',5],['risk_safety_score','Risk Safety Score',4]];const dH=dims.map(([k,l,m])=>{const v=typeof R[k]==='number'?R[k]:0;const p=Math.round(v/m*100);const c=p>=75?'high':p>=50?'mid':'low';return`<div class="dim-row"><div class="dim-name">${esc(l)}</div><div class="dim-bar-wrap"><div class="dim-bar ${c}" style="width:${p}%"></div></div><div class="dim-score">${v}/${m}</div></div>`;}).join('');document.getElementById('page-readiness').innerHTML=`<div class="inner"><h1 class="page-h1">Readiness Score</h1><p class="page-sub">AI-powered assessment across 14 dimensions.</p><div class="score-hero"><div class="score-num">${score}</div><div class="score-lbl">out of 100</div><div class="score-badge ${rec}">${rl[rec]||rec}</div>${R.summary?`<div class="score-summary">${esc(R.summary)}</div>`:''}</div><div class="dims">${dH}</div></div>`;}
rLanding();rDemo();rSales();try{rFulfillment();}catch(e){console.error('rFulfillment:',e);document.getElementById('page-fulfillment').innerHTML='<div class="empty"><p>Fulfillment render error: '+e.message+'</p></div>';}try{rReadiness();}catch(e){console.error('rReadiness:',e);document.getElementById('page-readiness').innerHTML='<div class="empty"><p>Readiness render error: '+e.message+'</p></div>';}
